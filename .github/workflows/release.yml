# ============================================================
# .github/workflows/release.yml — Fixed
# ============================================================
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options: [patch, minor, major]
        default: patch

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # ─── حساب الـ version ────────────────────────────────────
  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.semver.outputs.new_version }}
      tag: ${{ steps.semver.outputs.tag }}
      changelog: ${{ steps.semver.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          # لازم fetch-depth: 0 عشان يجيب كل الـ tags
          fetch-depth: 0

      - name: Calculate next version
        id: semver
        run: |
          # جيب آخر tag — FIX: head -1 بيرجع exit 0 حتى لو فاضي
          # الحل: فحص isEmpty بشكل صريح
          LATEST=$(git tag --sort=-v:refname | grep '^v' | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          echo "Latest tag: $LATEST"

          VERSION=${LATEST#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          # حدد نوع الـ bump
          BUMP="${{ github.event.inputs.bump }}"
          if [ -z "$BUMP" ]; then
            COMMITS=$(git log ${LATEST}..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")
            if echo "$COMMITS" | grep -qiE "^(feat|feature)(\(.+\))?!:|BREAKING CHANGE"; then
              BUMP="major"
            elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
              BUMP="minor"
            else
              BUMP="patch"
            fi
          fi

          echo "Bump type: $BUMP"

          case $BUMP in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_TAG="v${NEW_VERSION}"

          # تأكد إن الـ version مش فاضي
          if [ -z "$NEW_VERSION" ]; then
            echo "ERROR: new_version is empty!"
            exit 1
          fi

          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${NEW_TAG}" >> $GITHUB_OUTPUT

          CHANGELOG=$(git log ${LATEST}..HEAD --pretty=format:"- %s (%h)" 2>/dev/null | head -20 || echo "- Initial release")
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "New version: $NEW_TAG"

      - name: Verify version is not empty
        run: |
          if [ -z "${{ steps.semver.outputs.new_version }}" ]; then
            echo "ERROR: new_version output is empty!"
            exit 1
          fi
          echo "Version verified: ${{ steps.semver.outputs.new_version }}"

  # ─── بناء ونشر Docker images ─────────────────────────────
  build-and-tag:
    name: Build, Tag & Sign Images (${{ matrix.service }})
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: ingestion
            context: services/ingestion
            dockerfile: services/ingestion/Dockerfile.arm64
          - service: processing
            context: .
            dockerfile: services/processing/Dockerfile.arm64
          - service: auth
            context: services/auth
            dockerfile: services/auth/Dockerfile.arm64
          - service: billing
            context: services/billing
            dockerfile: services/billing/Dockerfile.arm64
          - service: notifications
            context: services/notifications
            dockerfile: services/notifications/Dockerfile.arm64
          - service: feature-flags
            context: services/feature-flags
            dockerfile: services/feature-flags/Dockerfile.arm64
          - service: control-plane
            context: services/control-plane
            dockerfile: services/control-plane/Dockerfile.arm64
          - service: developer-portal
            context: services/developer-portal
            dockerfile: services/developer-portal/Dockerfile.arm64
          - service: tenant-operator
            context: services/tenant-operator
            dockerfile: services/tenant-operator/Dockerfile.arm64
          - service: hydration
            context: services/hydration
            dockerfile: services/hydration/Dockerfile.arm64
          - service: analytics
            context: services/analytics
            dockerfile: services/analytics/Dockerfile.arm64
          - service: search
            context: services/search
            dockerfile: services/search/Dockerfile.arm64
          - service: jobs
            context: services/jobs
            dockerfile: services/jobs/Dockerfile.arm64
          - service: realtime
            context: services/realtime
            dockerfile: services/realtime/Dockerfile.arm64
          - service: ml-engine
            context: services/ml-engine
            dockerfile: services/ml-engine/Dockerfile.arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.4'

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify version before build
        run: |
          VERSION="${{ needs.version.outputs.new_version }}"
          if [ -z "$VERSION" ]; then
            echo "ERROR: Version is empty — aborting build"
            exit 1
          fi
          echo "Building version: $VERSION"

      - name: Build & Push — ${{ matrix.service }}
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64,linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ needs.version.outputs.new_version }}
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.version=${{ needs.version.outputs.new_version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image — ${{ matrix.service }}
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}

  # ─── GitHub Release ──────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [version, build-and-tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create Git Tag
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping"
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: "Release ${{ needs.version.outputs.tag }}"
          body: |
            ## What's Changed

            ${{ needs.version.outputs.changelog }}

            ## Docker Images

            ```bash
            docker pull ghcr.io/${{ github.repository }}/ingestion:${{ needs.version.outputs.new_version }}
            docker pull ghcr.io/${{ github.repository }}/processing:${{ needs.version.outputs.new_version }}
            ```

            ## Verify Signatures
            ```bash
            cosign verify ghcr.io/${{ github.repository }}/ingestion:${{ needs.version.outputs.new_version }}
            cosign verify ghcr.io/${{ github.repository }}/processing:${{ needs.version.outputs.new_version }}
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
