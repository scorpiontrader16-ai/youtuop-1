# ============================================================
# .github/workflows/release.yml — Fixed
# ============================================================
#
# TODO [M-05]: Migrate PAT_TOKEN to GitHub App token
#   PAT_TOKEN is a Personal Access Token tied to a human account.
#   Risk: if the account is compromised or the person leaves,
#   the entire release pipeline breaks.
#   
#   Action items:
#   1. Create GitHub App with permissions: contents:write only
#   2. Install App on this repository
#   3. Replace secrets.PAT_TOKEN with App token generation:
#      - uses: actions/create-github-app-token@v1
#        id: app-token
#        with:
#          app-id: ${{ secrets.APP_ID }}
#          private-key: ${{ secrets.APP_PRIVATE_KEY }}
#   4. Use steps.app-token.outputs.token instead of PAT_TOKEN
# ============================================================
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options: [patch, minor, major]
        default: patch

env:
  REPO: ghcr.io/scorpiontrader16-ai/amnix-finance

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # ─── حساب الـ version ────────────────────────────────────
  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      new_version: ${{ steps.semver.outputs.new_version }}
      tag: ${{ steps.semver.outputs.tag }}
      changelog: ${{ steps.semver.outputs.changelog }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          # لازم fetch-depth: 0 عشان يجيب كل الـ tags
          fetch-depth: 0

      - name: Calculate next version
        id: semver
        run: |
          # جيب آخر tag — FIX: head -1 بيرجع exit 0 حتى لو فاضي
          # الحل: فحص isEmpty بشكل صريح
          LATEST=$(git tag --sort=-v:refname | grep '^v' | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          echo "Latest tag: $LATEST"

          VERSION=${LATEST#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          # حدد نوع الـ bump
          BUMP="${{ github.event.inputs.bump }}"
          if [ -z "$BUMP" ]; then
            COMMITS=$(git log ${LATEST}..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")
            if echo "$COMMITS" | grep -qiE "^(feat|feature)(\(.+\))?!:|BREAKING CHANGE"; then
              BUMP="major"
            elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
              BUMP="minor"
            else
              BUMP="patch"
            fi
          fi

          echo "Bump type: $BUMP"

          case $BUMP in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_TAG="v${NEW_VERSION}"

          # تأكد إن الـ version مش فاضي
          if [ -z "$NEW_VERSION" ]; then
            echo "ERROR: new_version is empty!"
            exit 1
          fi

          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${NEW_TAG}" >> $GITHUB_OUTPUT

          CHANGELOG=$(git log ${LATEST}..HEAD --pretty=format:"- %s (%h)" 2>/dev/null | head -20 || echo "- Initial release")
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "New version: $NEW_TAG"

      - name: Verify version is not empty
        run: |
          if [ -z "${{ steps.semver.outputs.new_version }}" ]; then
            echo "ERROR: new_version output is empty!"
            exit 1
          fi
          echo "Version verified: ${{ steps.semver.outputs.new_version }}"

  # ─── بناء ونشر Docker images ─────────────────────────────
  build-and-tag:
    name: Build, Tag & Sign Images (${{ matrix.service }})
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: ingestion
            context: .
            dockerfile: services/ingestion/Dockerfile.arm64
          - service: processing
            context: .
            dockerfile: services/processing/Dockerfile.arm64
          - service: auth
            context: services/auth
            dockerfile: services/auth/Dockerfile.arm64
          - service: billing
            context: services/billing
            dockerfile: services/billing/Dockerfile.arm64
          - service: notifications
            context: services/notifications
            dockerfile: services/notifications/Dockerfile.arm64
          - service: feature-flags
            context: services/feature-flags
            dockerfile: services/feature-flags/Dockerfile.arm64
          - service: control-plane
            context: services/control-plane
            dockerfile: services/control-plane/Dockerfile.arm64
          - service: developer-portal
            context: services/developer-portal
            dockerfile: services/developer-portal/Dockerfile.arm64
          - service: tenant-operator
            context: services/tenant-operator
            dockerfile: services/tenant-operator/Dockerfile.arm64
          - service: hydration
            context: .
            dockerfile: services/hydration/Dockerfile.arm64
          - service: analytics
            context: services/analytics
            dockerfile: services/analytics/Dockerfile.arm64
          - service: search
            context: services/search
            dockerfile: services/search/Dockerfile.arm64
          - service: jobs
            context: services/jobs
            dockerfile: services/jobs/Dockerfile.arm64
          - service: realtime
            context: services/realtime
            dockerfile: services/realtime/Dockerfile.arm64
          - service: ml-engine
            context: services/ml-engine
            dockerfile: services/ml-engine/Dockerfile
          - service: data-quality
            context: services/data-quality
            dockerfile: services/data-quality/Dockerfile
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Install Cosign
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9  # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Verify version before build
        run: |
          VERSION="${{ needs.version.outputs.new_version }}"
          if [ -z "$VERSION" ]; then
            echo "ERROR: Version is empty — aborting build"
            exit 1
          fi
          echo "Building version: $VERSION"

      - name: Build & Push — ${{ matrix.service }}
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64,linux/amd64
          push: true
          tags: |
            ${{ env.REPO }}/${{ matrix.service }}:latest
            ${{ env.REPO }}/${{ matrix.service }}:${{ needs.version.outputs.new_version }}
            ${{ env.REPO }}/${{ matrix.service }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.version=${{ needs.version.outputs.new_version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image — ${{ matrix.service }}
        run: |
          cosign sign --yes \
            ${{ env.REPO }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}

      - name: Save digest for overlay update
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > /tmp/digests/${{ matrix.service }}.txt

      - name: Upload digest artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4
        with:
          name: digest-${{ matrix.service }}
          path: /tmp/digests/${{ matrix.service }}.txt
          retention-days: 1

  # ─── Update Production Overlays with Digests ─────────────
  update-overlays:
    name: Update Production Overlays
    needs: [version, build-and-tag]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install yq
        run: |
          curl -sSL \
            "https://github.com/mikefarah/yq/releases/download/v4.43.1/yq_linux_amd64" \
            -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Download all digest artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Update production overlays with digests
        run: |
          set -euo pipefail
          cd /tmp/digests
          for digest_file in *.txt; do
            SERVICE="${digest_file%.txt}"
            DIGEST=$(cat "$digest_file")
            OVERLAY="${GITHUB_WORKSPACE}/k8s/overlays/production/${SERVICE}/kustomization.yaml"
            
            if [ -f "$OVERLAY" ]; then
              echo "Updating $SERVICE with digest: $DIGEST"
              yq -i ".images[0].digest = \"${DIGEST}\"" "$OVERLAY"
            else
              echo "WARNING: Overlay not found for $SERVICE — skipping"
            fi
          done

      - name: Commit and push overlay updates
        run: |
          git add k8s/overlays/production/*/kustomization.yaml
          if git diff --staged --quiet; then
            echo "No overlay changes — skipping commit"
            exit 0
          fi
          
          git commit -m "chore(release): update production overlays with image digests for ${{ needs.version.outputs.tag }} [skip ci]"
          git push origin main

  # ─── GitHub Release ──────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [version, build-and-tag, update-overlays]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create Git Tag
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping"
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: "Release ${{ needs.version.outputs.tag }}"
          body: |
            ## What's Changed

            ${{ needs.version.outputs.changelog }}

            ## Docker Images

            ```bash
            docker pull ${{ env.REPO }}/ingestion:${{ needs.version.outputs.new_version }}
            docker pull ${{ env.REPO }}/processing:${{ needs.version.outputs.new_version }}
            ```

            ## Verify Signatures
            ```bash
            cosign verify ${{ env.REPO }}/ingestion:${{ needs.version.outputs.new_version }}
            cosign verify ${{ env.REPO }}/processing:${{ needs.version.outputs.new_version }}
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
