name: Build, Sign & SBOM

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'services/ingestion/**'
      - 'services/processing/**'
      - 'services/auth/**'
      - 'services/billing/**'
      - 'services/notifications/**'
      - 'services/analytics/**'
      - 'services/control-plane/**'
      - 'services/developer-portal/**'
      - 'services/feature-flags/**'
      - 'services/jobs/**'
      - 'services/realtime/**'
      - 'services/search/**'
      - 'services/tenant-operator/**'
      - 'services/ml-engine/**'
      - 'proto/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

jobs:

  build-sign-ingestion:
    name: Build, Sign & SBOM — Ingestion
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.4'

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get current version
        id: version
        run: |
          LATEST=$(git tag --sort=-v:refname | grep '^v' | head -1)
          if [ -z "$LATEST" ]; then LATEST="v0.0.0"; fi
          VERSION="${LATEST#v}"
          if [ -z "$VERSION" ]; then VERSION="0.0.0"; fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Resolved version: $VERSION"

      - name: Build & Push — Ingestion
        id: build-ingestion
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/ingestion/Dockerfile.arm64
          platforms: linux/arm64,linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/ingestion:latest
            ghcr.io/${{ github.repository }}/ingestion:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}/ingestion:${{ github.sha }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image — Ingestion
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}/ingestion@${{ steps.build-ingestion.outputs.digest }}

      - name: Generate SBOM — Ingestion
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}/ingestion@${{ steps.build-ingestion.outputs.digest }}
          format: spdx-json
          output-file: sbom-ingestion.spdx.json

      - name: Attach SBOM to image — Ingestion
        run: |
          cosign attach sbom \
            --sbom sbom-ingestion.spdx.json \
            ghcr.io/${{ github.repository }}/ingestion@${{ steps.build-ingestion.outputs.digest }}

      - name: Scan SBOM for vulnerabilities — Ingestion
        uses: anchore/scan-action@v3
        with:
          sbom: sbom-ingestion.spdx.json
          fail-build: false
          severity-cutoff: critical

      - name: Upload SBOM — Ingestion
        uses: actions/upload-artifact@v4
        with:
          name: sbom-ingestion
          path: sbom-ingestion.spdx.json
          retention-days: 90

