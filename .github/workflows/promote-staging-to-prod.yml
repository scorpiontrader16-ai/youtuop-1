# ╔══════════════════════════════════════════════════════════════════════╗
# ║  Full path: .github/workflows/promote-staging-to-prod.yml           ║
# ║  Status: ✏️ Modified — GAP-01 Step 4                                ║
# ╚══════════════════════════════════════════════════════════════════════╝
#
# ─────────────────────────────────────────────────────────────────────────────
# الغرض:
#   ترقية service من staging إلى production عبر تحديث newTag في
#   k8s/overlays/production/{service}/kustomization.yaml
#   ArgoCD (platform-appset) يلتقط التغيير ويُزامن production تلقائياً
#
# دورة الحياة الكاملة:
#   1. release.yml  → يبني image جديد → يُحدِّث production overlay newTag
#   2. platform-appset → يُزامن production تلقائياً (ArgoCD)
#   3. هذا الـ workflow → ترقية يدوية عند الحاجة
#   4. platform-appset → يُزامن production تلقائياً (ArgoCD)
#
# المدخلات:
#   service: اسم الـ service من قائمة الـ 15 service
#   version: الـ version للترقية (مطلوب — صيغة x.y.z)
#   reason:  سبب الترقية (يظهر في git commit message)
#
# الأمان:
#   • concurrency per-service: لا ترقيتان على نفس الـ service في نفس الوقت
#   • cancel-in-progress: false — لا نلغي ترقية جارية أبداً
#   • semver validation: يرفض version بصيغة خاطئة
#   • GHCR verification: يتحقق من وجود الـ image قبل التعديل
#   • git diff check: لا commit إذا لا يوجد تغيير فعلي
#   • [skip ci]: يمنع trigger CI على commit الترقية
#   • retry logic: 3 محاولات مع exponential backoff عند push failure
#
# التطبيق:
#   GitHub → Actions → Promote Staging to Production → Run workflow
# ─────────────────────────────────────────────────────────────────────────────
name: Promote Staging to Production

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to promote'
        required: true
        type: choice
        options:
          - ingestion
          - processing
          - auth
          - billing
          - notifications
          - feature-flags
          - control-plane
          - developer-portal
          - tenant-operator
          - hydration
          - analytics
          - search
          - jobs
          - realtime
          - ml-engine
          - data-quality
      version:
        description: 'Version to promote (e.g. 1.2.3)'
        required: true
        type: string
      reason:
        description: 'Reason for promotion (appears in git commit message)'
        required: true
        type: string
        default: 'scheduled promotion'

# concurrency per-service — ترقيتان مختلفتان يمكن أن تعملا بالتوازي
# لكن لا ترقيتان على نفس الـ service في نفس الوقت
concurrency:
  group: promote-${{ github.event.inputs.service }}
  cancel-in-progress: false

permissions:
  contents: read   # job-level overrides — defined explicitly per-job

jobs:
  promote:
    name: Promote ${{ github.event.inputs.service }} to production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      packages: read
    environment:
      name: production
      url: https://argocd.platform.com

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install yq
        run: |
          set -euo pipefail
          curl -sSL \
            "https://github.com/mikefarah/yq/releases/download/v4.43.1/yq_linux_amd64" \
            -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
          yq --version

      - name: Validate inputs
        id: validate
        env:
          INPUT_SERVICE: ${{ github.event.inputs.service }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          IFS=$'\n\t'

          SERVICE="${INPUT_SERVICE}"
          VERSION="${INPUT_VERSION}"
          VERSION="${VERSION#v}"
          PROD_FILE="k8s/overlays/production/${SERVICE}/kustomization.yaml"

          # ── Validate semver format (x.y.z) ──────────────────────────────
          if ! echo "${VERSION}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format '${VERSION}' — expected x.y.z (e.g. 1.2.3)"
            exit 1
          fi

          # ── Verify production overlay exists ────────────────────────────
          if [ ! -f "${PROD_FILE}" ]; then
            echo "::error::Production overlay not found: ${PROD_FILE}"
            exit 1
          fi

          echo "version=${VERSION}"       >> "${GITHUB_OUTPUT}"
          echo "prod_file=${PROD_FILE}"   >> "${GITHUB_OUTPUT}"
          echo "service=${SERVICE}"       >> "${GITHUB_OUTPUT}"
          echo "Inputs validated — service=${SERVICE} version=${VERSION}"

      - name: Verify image exists in GHCR
        run: |
          set -euo pipefail
          IFS=$'\n\t'

          SERVICE="${{ steps.validate.outputs.service }}"
          VERSION="${{ steps.validate.outputs.version }}"
          IMAGE_URL="ghcr.io/scorpiontrader16-ai/amnix-finance/${SERVICE}:${VERSION}"

          echo "Verifying image exists: ${IMAGE_URL}"

          # تسجيل دخول إلى GHCR
          echo "${GITHUB_TOKEN}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          # فحص وجود الـ image
          if ! docker manifest inspect "${IMAGE_URL}" >/dev/null 2>&1; then
            echo "::error::Image not found in GHCR: ${IMAGE_URL}"
            echo "Available versions for ${SERVICE}:"
            curl -sSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              "https://ghcr.io/v2/scorpiontrader16-ai/amnix-finance/${SERVICE}/tags/list" \
              | jq -r ".tags[]" 2>/dev/null | head -10 || echo "  Could not fetch available tags"
            exit 1
          fi

          echo "✅ Image verified: ${IMAGE_URL}"


      - name: Read current production version
        id: current
        run: |
          set -euo pipefail
          PROD_FILE="${{ steps.validate.outputs.prod_file }}"
          CURRENT=$(yq '.images[0].newTag' "${PROD_FILE}")
          echo "current_version=${CURRENT}" >> "${GITHUB_OUTPUT}"
          echo "Current production version : ${CURRENT}"
          echo "Promoting to version       : ${{ steps.validate.outputs.version }}"

      - name: Update production kustomization
        run: |
          set -euo pipefail
          IFS=$'\n\t'

          VERSION="${{ steps.validate.outputs.version }}"
          PROD_FILE="${{ steps.validate.outputs.prod_file }}"

          yq -i ".images[0].newTag = \"${VERSION}\"" "${PROD_FILE}"

          # Verify the update was applied correctly
          ACTUAL=$(yq '.images[0].newTag' "${PROD_FILE}")
          if [ "${ACTUAL}" != "${VERSION}" ]; then
            echo "::error::Tag update failed — expected ${VERSION}, got ${ACTUAL}"
            exit 1
          fi

          echo "Updated ${PROD_FILE}:"
          cat "${PROD_FILE}"

      - name: Commit and push
        env:
          INPUT_REASON: ${{ github.event.inputs.reason }}
        run: |
          set -euo pipefail
          IFS=$'\n\t'

          SERVICE="${{ steps.validate.outputs.service }}"
          VERSION="${{ steps.validate.outputs.version }}"
          FROM="${{ steps.current.outputs.current_version }}"
          REASON="${INPUT_REASON}"
          PROD_FILE="${{ steps.validate.outputs.prod_file }}"

          git add "${PROD_FILE}"

          # لا commit إذا لا يوجد تغيير فعلي
          if git diff --staged --quiet; then
            echo "No changes — production already at version ${VERSION}"
            exit 0
          fi

          # [skip ci] — يمنع trigger CI مجدداً على هذا الـ commit
          COMMIT_MSG="chore(promote): ${SERVICE} ${FROM} to ${VERSION} [skip ci] | reason: ${REASON} | by: ${{ github.actor }} | run: ${{ github.run_id }}"
          git commit -m "${COMMIT_MSG}"

          # Retry logic — max 3 attempts مع exponential backoff
          for attempt in 1 2 3; do
            if git push origin main; then
              echo "Promoted ${SERVICE}: ${FROM} to ${VERSION}"
              break
            fi
            if [ "${attempt}" -eq 3 ]; then
              echo "::error::Failed to push after 3 attempts"
              exit 1
            fi
            echo "Push failed — attempt ${attempt}/3 — retrying in $((attempt * 5))s"
            sleep $((attempt * 5))
            git pull --rebase origin main
          done

      - name: Summary
        env:
          INPUT_REASON: ${{ github.event.inputs.reason }}
        run: |
          set -euo pipefail
          SERVICE="${{ steps.validate.outputs.service }}"
          VERSION="${{ steps.validate.outputs.version }}"
          FROM="${{ steps.current.outputs.current_version }}"

          echo "## Promotion Complete" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Field | Value |" >> "${GITHUB_STEP_SUMMARY}"
          echo "|-------|-------|" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Service | ${SERVICE} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| From | ${FROM} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| To | ${VERSION} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Promoted by | @${{ github.actor }} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Reason | ${INPUT_REASON} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "ArgoCD will sync automatically within 3 minutes." >> "${GITHUB_STEP_SUMMARY}"
