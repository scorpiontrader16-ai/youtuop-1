name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-proto:
    name: Proto Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: '1.32.2'
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Lint proto files
        working-directory: proto
        run: buf lint

  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy-ingestion:
    name: Trivy — Ingestion Service
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.69.3
      - name: Run Trivy on ingestion
        run: |
          trivy fs \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --ignore-unfixed \
            services/ingestion

  trivy-processing:
    name: Trivy — Processing Service
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.69.3
      - name: Run Trivy on processing
        run: |
          trivy fs \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --ignore-unfixed \
            services/processing

  codeql:
    name: CodeQL — Go Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go 1.24
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: services/ingestion/go.mod
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go
          queries: security-and-quality
      - name: Tidy dependencies
        working-directory: services/ingestion
        run: go mod tidy
      - name: Build for CodeQL
        working-directory: services/ingestion
        run: |
          CGO_ENABLED=0 go build \
            -ldflags="-s -w" \
            -trimpath \
            ./cmd/server
      - name: Perform CodeQL Analysis
        continue-on-error: true
        uses: github/codeql-action/analyze@v3
        with:
          category: go
          upload: never

  semgrep:
    name: Semgrep Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/golang
            p/rust
            p/secrets
            p/docker
            p/terraform
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  build-go:
    name: Go — Ingestion Service
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go 1.24
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: services/ingestion/go.mod
      - name: Tidy dependencies
        working-directory: services/ingestion
        run: go mod tidy
      - name: Build
        working-directory: services/ingestion
        run: |
          CGO_ENABLED=0 go build \
            -ldflags="-s -w -X main.version=ci" \
            -trimpath \
            ./cmd/server
      - name: Vet
        working-directory: services/ingestion
        run: go vet ./...
      - name: Test
        working-directory: services/ingestion
        run: go test ./... -timeout 60s

  build-rust:
    name: Rust — Processing Service
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            protobuf-compiler \
            pkg-config \
            libssl-dev \
            libcurl4-openssl-dev \
            libsasl2-dev \
            cmake \
            gcc \
            g++ \
            make
      - name: Setup Rust 1.88
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.88.0'
          components: clippy
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/processing/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('services/processing/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Build
        working-directory: services/processing
        run: cargo build --release
      - name: Test
        working-directory: services/processing
        run: cargo test
      - name: Clippy
        working-directory: services/processing
        run: cargo clippy -- -D warnings

  validate-terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform 1.7
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'
      - name: Validate Production
        working-directory: infra/terraform/environments/production
        run: |
          terraform init -backend=false
          terraform validate
      - name: Validate EU West
        working-directory: infra/terraform/environments/eu-west-1
        run: |
          terraform init -backend=false
          terraform validate
      - name: Validate Staging
        working-directory: infra/terraform/environments/staging
        run: |
          terraform init -backend=false
          terraform validate
