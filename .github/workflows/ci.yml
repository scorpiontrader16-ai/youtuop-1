  build-rust:
    name: Rust — Processing Service
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            protobuf-compiler \
            pkg-config \
            libssl-dev \
            libcurl4-openssl-dev \
            libsasl2-dev \
            cmake \
            gcc \
            g++ \
            make
      - name: Setup Rust 1.88
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.88.0'
          components: clippy
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/processing/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('services/processing/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Build
        working-directory: services/processing
        run: cargo build --release
      - name: Test
        working-directory: services/processing
        run: cargo test
      - name: Clippy
        working-directory: services/processing
        run: cargo clippy -- -D warnings

  validate-terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform 1.7
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'
      - name: Validate Production
        working-directory: infra/terraform/environments/production
        run: |
          terraform init -backend=false
          terraform validate
      - name: Validate EU West
        working-directory: infra/terraform/environments/eu-west-1
        run: |
          terraform init -backend=false
          terraform validate
      - name: Validate Staging
        working-directory: infra/terraform/environments/staging
        run: |
          terraform init -backend=false
          terraform validate
      - name: Validate Modules
        run: |
          for dir in infra/terraform/modules/*/; do
            if [ -d "$dir" ]; then
              echo "Validating $dir"
              terraform -chdir="$dir" init -backend=false
              terraform -chdir="$dir" validate
            fi
          done
