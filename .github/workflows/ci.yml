name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════
  # 1️⃣  Proto Lint
  # ════════════════════════════════════════
  lint-proto:
    name: Proto Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Lint proto files
        working-directory: proto
        run: buf lint

  # ════════════════════════════════════════
  # 2️⃣  Go — Ingestion Service
  # ════════════════════════════════════════
  build-go:
    name: Go — Ingestion Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: services/ingestion/go.mod
          
      - name: Tidy dependencies
        working-directory: services/ingestion
        run: go mod tidy
        
      - name: Build
        working-directory: services/ingestion
        run: |
          CGO_ENABLED=0 go build \
            -ldflags="-s -w -X main.version=ci" \
            -trimpath \
            ./cmd/server
            
      - name: Vet
        working-directory: services/ingestion
        run: go vet ./...
        
      - name: Test
        working-directory: services/ingestion
        run: go test ./... -timeout 60s

  # ════════════════════════════════════════
  # 3️⃣  Rust — Processing Service
  # ════════════════════════════════════════
  build-rust:
    name: Rust — Processing Service
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      
      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            protobuf-compiler \
            pkg-config \
            libssl-dev \
            libcurl4-openssl-dev \
            libsasl2-dev \
            cmake
            
      - name: Setup Rust 1.85
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.85.0'
          components: clippy
          
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/processing/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('services/processing/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-
          
      - name: Build
        working-directory: services/processing
        run: cargo build --release
        
      - name: Test
        working-directory: services/processing
        run: cargo test
        
      - name: Clippy
        working-directory: services/processing
        run: cargo clippy -- -D warnings

  # ════════════════════════════════════════
  # 4️⃣  Terraform Validate
  # ════════════════════════════════════════
  validate-terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform 1.7
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'
          
      - name: Validate Production
        working-directory: infra/terraform/environments/production
        run: |
          terraform init -backend=false
          terraform validate
          
      - name: Validate Staging
        working-directory: infra/terraform/environments/staging
        run: |
          terraform init -backend=false
          terraform validate
          
      - name: Validate Modules
        run: |
          for dir in infra/terraform/modules/*/; do
            if [ -d "$dir" ]; then
              echo "→ Validating: $dir"
              terraform -chdir="$dir" init -backend=false
              terraform -chdir="$dir" validate
            fi
          done

  # ════════════════════════════════════════
  # 5️⃣  Kubernetes Validate
  # ════════════════════════════════════════
  validate-k8s:
    name: Kubernetes Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        
      - name: Validate K8s manifests
        run: |
          for f in $(find k8s -name "*.yaml" ! -name "kustomization.yaml"); do
            echo "→ Checking: $f"
            kubectl apply --dry-run=client --validate=false -f "$f"
          done
          
      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2
        
      - name: Validate kustomize
        run: |
          echo "→ Building production/ingestion overlay"
          kustomize build k8s/overlays/production/ingestion > /dev/null
          echo "→ Building production/processing overlay"
          kustomize build k8s/overlays/production/processing > /dev/null

  # ════════════════════════════════════════
  # 6️⃣  Integration Tests (مصحح 100%)
  # ════════════════════════════════════════
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build-go, build-rust]
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform
          POSTGRES_DB: platform
        options: >-
          --health-cmd "pg_isready -U platform"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432

      clickhouse:
        image: clickhouse/clickhouse-server:24.3-alpine
        env:
          CLICKHOUSE_USER: platform
          CLICKHOUSE_PASSWORD: platform
          CLICKHOUSE_DB: events
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 8123:8123
          - 9000:9000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: services/ingestion/go.mod

      - name: Install tools
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@latest
          
          # Install mc client
          curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc \
            -o /usr/local/bin/mc && chmod +x /usr/local/bin/mc
          
          # Install curl (already installed, but ensure it's there)
          sudo apt-get update && sudo apt-get install -y curl

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U platform; then
              echo "✅ Postgres ready"
              exit 0
            fi
            echo "Waiting for Postgres... ($i/30)"
            sleep 2
          done
          echo "❌ Postgres not ready"
          exit 1

      - name: Wait for ClickHouse
        run: |
          for i in $(seq 1 30); do
            # Use HTTP ping with basic auth
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -u platform:platform http://localhost:8123/ping)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ ClickHouse ready"
              exit 0
            fi
            echo "Waiting for ClickHouse... ($i/30) HTTP: $HTTP_CODE"
            sleep 2
          done
          echo "❌ ClickHouse not ready"
          exit 1

      - name: Setup ClickHouse Schema
        run: |
          echo "📦 Creating database if not exists..."
          curl -sS -u platform:platform "http://localhost:8123/" \
            -d "CREATE DATABASE IF NOT EXISTS events" || {
              echo "❌ Failed to create database"
              exit 1
            }
          
          echo "📄 Applying schema from init.sql..."
          
          # Check if init.sql exists
          if [ ! -f infra/clickhouse/init.sql ]; then
            echo "⚠️ init.sql not found, skipping schema application"
            exit 0
          fi
          
          # Read and execute each non-empty, non-comment line
          FAILED=0
          while IFS= read -r line || [ -n "$line" ]; do
            # Skip comments and empty lines
            if [[ "$line" =~ ^-- ]] || [[ -z "${line// /}" ]]; then
              continue
            fi
            
            # Skip lines that are just semicolons
            if [[ "$line" =~ ^;+$ ]]; then
              continue
            fi
            
            echo "   Executing: ${line:0:60}..."
            RESPONSE=$(curl -s -w "\n%{http_code}" -u platform:platform \
              "http://localhost:8123/?database=events" \
              -d "$line")
            
            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | sed '$d')
            
            if [ "$HTTP_CODE" != "200" ]; then
              echo "   ❌ Failed (HTTP $HTTP_CODE): $BODY"
              FAILED=1
            else
              echo "   ✅ Success"
            fi
          done < infra/clickhouse/init.sql
          
          if [ $FAILED -eq 1 ]; then
            echo "❌ Schema application failed"
            exit 1
          fi
          
          echo "✅ ClickHouse schema applied successfully"
          
          # Verify tables were created
          echo "📊 Verifying tables:"
          curl -sS -u platform:platform "http://localhost:8123/?database=events" \
            -d "SHOW TABLES" || echo "⚠️ Could not list tables"

      - name: Run Postgres migrations
        run: |
          goose \
            -dir services/ingestion/internal/postgres/migrations \
            postgres \
            "postgres://platform:platform@localhost:5432/platform?sslmode=disable" \
            up
            
          echo "✅ Postgres migrations applied"

      - name: Run integration tests
        working-directory: services/ingestion
        env:
          # Postgres
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: platform
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform
          POSTGRES_SSL_MODE: disable
          
          # ClickHouse - استخدام HTTP port للاتصال
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_HTTP_PORT: "8123"
          CLICKHOUSE_TCP_PORT: "9000"
          CLICKHOUSE_DB: events
          CLICKHOUSE_USER: platform
          CLICKHOUSE_PASSWORD: platform
          
          # MinIO (إذا كانت هناك حاجة)
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin123
          MINIO_USE_SSL: "false"
          MINIO_BUCKET_PARQUET: parquet-archive
          MINIO_PREFIX: events
        run: |
          # Check if integration tests exist
          if [ -d "./internal/clickhouse" ] || [ -d "./internal/postgres" ]; then
            go test -tags=integration -v -timeout=120s \
              ./internal/clickhouse/... \
              ./internal/postgres/... || {
                echo "⚠️ Some integration tests failed"
                exit 1
              }
          else
            echo "⚠️ No integration test directories found"
          fi
