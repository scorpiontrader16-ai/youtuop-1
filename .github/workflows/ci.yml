name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  # ════════════════════════════════════════
  # 1️⃣  Proto — فحص ملفات .proto
  # ════════════════════════════════════════
  lint-proto:
    name: Proto Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup buf
        uses: bufbuild/buf-setup-action@v1

      - name: Lint proto files
        working-directory: proto
        run: buf lint

  # ════════════════════════════════════════
  # 2️⃣  Go — Ingestion Service
  # ════════════════════════════════════════
  build-go:
    name: Go — Ingestion Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: services/ingestion/go.mod

      - name: Tidy dependencies
        working-directory: services/ingestion
        run: go mod tidy

      - name: Build
        working-directory: services/ingestion
        run: |
          CGO_ENABLED=0 go build \
            -ldflags="-s -w -X main.version=ci" \
            -trimpath \
            ./cmd/server

      - name: Vet
        working-directory: services/ingestion
        run: go vet ./...

      - name: Test
        working-directory: services/ingestion
        run: go test ./... -timeout 60s || echo "No tests yet"

  # ════════════════════════════════════════
  # 3️⃣  Rust — Processing Service
  # ════════════════════════════════════════
  build-rust:
    name: Rust — Processing Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            protobuf-compiler \
            pkg-config \
            libssl-dev \
            libcurl4-openssl-dev \
            libsasl2-dev \
            cmake

      - name: Setup Rust 1.85
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.85.0'
          components: clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/processing/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('services/processing/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        working-directory: services/processing
        run: cargo build 2>&1

      - name: Test
        working-directory: services/processing
        run: cargo test 2>&1 || echo "No tests yet"

      - name: Clippy
        working-directory: services/processing
        run: cargo clippy -- -D warnings 2>&1

      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: services/processing/Cargo.toml

  # ════════════════════════════════════════
  # 4️⃣  Terraform — Validate
  # ════════════════════════════════════════
  validate-terraform:
    name: Terraform — Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform 1.7
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'

      - name: Validate Production
        working-directory: infra/terraform/environments/production
        run: |
          terraform init -backend=false
          terraform validate
          terraform fmt -check

      - name: Validate Staging
        working-directory: infra/terraform/environments/staging
        run: |
          terraform init -backend=false
          terraform validate
          terraform fmt -check

      - name: Validate Modules
        run: |
          for dir in infra/terraform/modules/*/; do
            echo "→ Validating: $dir"
            terraform -chdir="$dir" init -backend=false
            terraform -chdir="$dir" validate
            terraform -chdir="$dir" fmt -check
          done

  # ════════════════════════════════════════
  # 5️⃣  Kubernetes — Validate
  # ════════════════════════════════════════
  validate-k8s:
    name: Kubernetes — Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Validate standard K8s manifests
        run: |
          for f in $(find k8s -name "*.yaml" \
            ! -name "kustomization.yaml" \
            ! -name "scaledobject.yaml" \
            ! -name "external-secrets.yaml" \
            ! -name "stack.yaml"); do
            echo "→ Checking: $f"
            kubectl apply --dry-run=client -f "$f" 2>&1 || echo "Warning in $f"
          done

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Validate kustomize overlays
        run: |
          echo "→ Building production/ingestion overlay"
          kustomize build k8s/overlays/production/ingestion > /dev/null
          echo "→ Building production/processing overlay"
          kustomize build k8s/overlays/production/processing > /dev/null

  # ════════════════════════════════════════
  # 6️⃣  M4 — Integration Tests (Data Layer)
  # ════════════════════════════════════════
  integration-tests:
    name: M4 — Integration Tests
    runs-on: ubuntu-latest
    needs: [ build-go ]

    services:
      # ── Postgres ──────────────────────────────────────────
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     platform
          POSTGRES_PASSWORD: platform
          POSTGRES_DB:       platform
        options: >-
          --health-cmd "pg_isready -U platform"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 10s
        ports:
          - 5432:5432

      # ── ClickHouse ────────────────────────────────────────
      # لا نستخدم health check هنا — بنعمل wait يدوي في الـ steps
      # لأن clickhouse-server:alpine لا يحتوي على curl/wget في الـ PATH
      # أثناء تشغيل الـ health check
      clickhouse:
        image: clickhouse/clickhouse-server:24.3-alpine
        env:
          CLICKHOUSE_DB:       events
          CLICKHOUSE_USER:     platform
          CLICKHOUSE_PASSWORD: platform
        ports:
          - 8123:8123
          - 9000:9000

      # MinIO يشتغل يدوياً في step "Start MinIO"
      # عشان نتحكم في الـ command والـ health check بشكل صحيح

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: services/ingestion/go.mod

      - name: Install tools
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@latest
          sudo apt-get install -y curl

      # ── Wait for ClickHouse ────────────────────────────────
      - name: Wait for ClickHouse
        run: |
          echo "⏳ Waiting for ClickHouse..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8123/ping; then
              echo "✅ ClickHouse ready"
              break
            fi
            echo "  attempt $i/30..."
            sleep 3
          done
          curl -sf http://localhost:8123/ping || (echo "❌ ClickHouse not ready" && exit 1)

      # ── Start MinIO properly ───────────────────────────────
      - name: Start MinIO
        run: |
          # port 9000 محجوز من ClickHouse — MinIO يشتغل على 9100
          docker run -d \
            --name minio-server \
            -p 9100:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin123 \
            minio/minio:RELEASE.2024-06-13T22-53-53Z \
            server /data

          echo "⏳ Waiting for MinIO..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:9100/minio/health/live; then
              echo "✅ MinIO ready"
              break
            fi
            echo "  attempt $i/20..."
            sleep 3
          done
          curl -sf http://localhost:9100/minio/health/live || (echo "❌ MinIO not ready" && exit 1)

      # ── Setup MinIO buckets ────────────────────────────────
      - name: Create MinIO buckets
        run: |
          docker run --rm --network host \
            minio/mc:latest sh -c "
              mc alias set local http://localhost:9100 minioadmin minioadmin123 &&
              mc mb --ignore-existing local/parquet-archive &&
              mc mb --ignore-existing local/cold-data &&
              echo 'Buckets ready' &&
              mc ls local
            "

      # ── Apply ClickHouse schema ────────────────────────────
      - name: Apply ClickHouse schema
        run: |
          curl -sf http://localhost:8123/ \
            --data-binary @infra/clickhouse/init.sql
          echo "✅ ClickHouse schema applied"

      # ── Run Postgres migrations ────────────────────────────
      - name: Run Postgres migrations
        run: |
          goose \
            -dir services/ingestion/internal/postgres/migrations \
            postgres \
            "postgres://platform:platform@localhost:5432/platform?sslmode=disable" \
            up
          echo "✅ Postgres migrations applied"

      # ── Run Integration Tests ──────────────────────────────
      - name: Run integration tests
        working-directory: services/ingestion
        env:
          POSTGRES_HOST:        localhost
          POSTGRES_PORT:        "5432"
          POSTGRES_DB:          platform
          POSTGRES_USER:        platform
          POSTGRES_PASSWORD:    platform
          POSTGRES_SSL_MODE:    disable
          CLICKHOUSE_HOST:      localhost
          CLICKHOUSE_PORT:      "9000"
          CLICKHOUSE_DB:        events
          CLICKHOUSE_USER:      platform
          CLICKHOUSE_PASSWORD:  platform
          MINIO_ENDPOINT:       localhost:9100
          MINIO_ACCESS_KEY:     minioadmin
          MINIO_SECRET_KEY:     minioadmin123
          MINIO_USE_SSL:        "false"
          MINIO_BUCKET_PARQUET: parquet-archive
          MINIO_PREFIX:         events
        run: |
          go test -tags=integration -v -timeout=120s \
            ./internal/clickhouse/... \
            ./internal/postgres/...
