    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Setup Go 1.24
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: '1.24'
          cache-dependency-path: services/ingestion/go.mod
      - name: Initialize CodeQL
        uses: github/codeql-action/init@d4b3ca9fa7f69d38bfcd667bdc45bc373d16277e  # v4
        with:
          languages: go
          queries: security-and-quality
      - name: Tidy dependencies
        working-directory: services/ingestion
        run: go mod tidy
      - name: Build for CodeQL
        working-directory: services/ingestion
        run: |
          CGO_ENABLED=0 go build \
            -ldflags="-s -w" \
            -trimpath \
            ./cmd/server
      - name: Perform CodeQL Analysis
        continue-on-error: true
        uses: github/codeql-action/analyze@d4b3ca9fa7f69d38bfcd667bdc45bc373d16277e  # v4
        with:
