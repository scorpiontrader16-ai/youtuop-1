name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  # ════════════════════════════════════════
  # 1️⃣  Proto — فحص ملفات .proto
  # ════════════════════════════════════════
  lint-proto:
    name: Proto Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint proto files
        working-directory: proto
        run: buf lint

  # ════════════════════════════════════════
  # 2️⃣  Go — Ingestion Service
  # ════════════════════════════════════════
  build-go:
    name: Go — Ingestion Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: services/ingestion/go.mod

      - name: Tidy dependencies
        working-directory: services/ingestion
        run: go mod tidy

      - name: Build
        working-directory: services/ingestion
        run: |
          CGO_ENABLED=0 go build \
            -ldflags="-s -w -X main.version=ci" \
            -trimpath \
            ./cmd/server

      - name: Vet
        working-directory: services/ingestion
        run: go vet ./...

      - name: Test
        working-directory: services/ingestion
        run: go test ./... -timeout 60s || echo "No tests yet"

  # ════════════════════════════════════════
  # 3️⃣  Rust — Processing Service
  # ════════════════════════════════════════
  build-rust:
    name: Rust — Processing Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            protobuf-compiler \
            pkg-config \
            libssl-dev \
            libcurl4-openssl-dev \
            libsasl2-dev \
            cmake

      - name: Setup Rust 1.85
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.85.0'
          components: clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/processing/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('services/processing/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        working-directory: services/processing
        run: cargo build 2>&1

      - name: Test
        working-directory: services/processing
        run: cargo test 2>&1 || echo "No tests yet"

      - name: Clippy
        working-directory: services/processing
        run: cargo clippy -- -D warnings 2>&1

      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: services/processing/Cargo.toml

  # ════════════════════════════════════════
  # 4️⃣  Terraform — Validate
  # ════════════════════════════════════════
  validate-terraform:
    name: Terraform — Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform 1.7
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'

      - name: Validate Production
        working-directory: infra/terraform/environments/production
        run: |
          terraform init -backend=false
          terraform validate
          terraform fmt -check

      - name: Validate Staging
        working-directory: infra/terraform/environments/staging
        run: |
          terraform init -backend=false
          terraform validate
          terraform fmt -check

      - name: Validate Modules
        run: |
          for dir in infra/terraform/modules/*/; do
            echo "→ Validating: $dir"
            terraform -chdir="$dir" init -backend=false
            terraform -chdir="$dir" validate
            terraform -chdir="$dir" fmt -check
          done

  # ════════════════════════════════════════
  # 5️⃣  Kubernetes — Validate
  # ════════════════════════════════════════
  validate-k8s:
    name: Kubernetes — Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Validate standard K8s manifests
        run: |
          for f in $(find k8s -name "*.yaml" \
            ! -name "kustomization.yaml" \
            ! -name "scaledobject.yaml" \
            ! -name "external-secrets.yaml" \
            ! -name "stack.yaml"); do
            echo "→ Checking: $f"
            kubectl apply --dry-run=client -f "$f" 2>&1 || echo "Warning in $f"
          done

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Validate kustomize overlays
        run: |
          echo "→ Building production/ingestion overlay"
          kustomize build k8s/overlays/production/ingestion > /dev/null
          echo "→ Building production/processing overlay"
          kustomize build k8s/overlays/production/processing > /dev/null

  # ════════════════════════════════════════
  # 6️⃣  M4 — Integration Tests (Data Layer)
  # ════════════════════════════════════════
  integration-tests:
    name: M4 — Integration Tests
    runs-on: ubuntu-latest
    needs: [ build-go ]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     platform
          POSTGRES_PASSWORD: platform
          POSTGRES_DB:       platform
        options: >-
          --health-cmd "pg_isready -U platform"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 10s
        ports:
          - 5432:5432

      clickhouse:
        image: clickhouse/clickhouse-server:24.3-alpine
        env:
          CLICKHOUSE_DB:       events
          CLICKHOUSE_USER:     platform
          CLICKHOUSE_PASSWORD: platform
        ports:
          - 8123:8123
          - 9100:9000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: services/ingestion/go.mod

      - name: Install tools
        run: |
          # goose
          go install github.com/pressly/goose/v3/cmd/goose@latest
          # clickhouse-client — لإرسال multi-statement SQL
          sudo apt-get install -y clickhouse-client || \
            (curl -sSL https://clickhouse.com/ | sh && \
             sudo install -m 755 clickhouse /usr/local/bin/clickhouse-client)
          # mc client للـ MinIO
          curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc \
            -o /usr/local/bin/mc && chmod +x /usr/local/bin/mc
          # minio server binary
          curl -sSL https://dl.min.io/server/minio/release/linux-amd64/minio \
            -o /usr/local/bin/minio && chmod +x /usr/local/bin/minio

      - name: Start MinIO
        run: |
          mkdir -p /tmp/minio-data
          MINIO_ROOT_USER=minioadmin \
          MINIO_ROOT_PASSWORD=minioadmin123 \
          nohup /usr/local/bin/minio server /tmp/minio-data \
            --address ":9000" \
            --console-address ":9001" \
            > /tmp/minio.log 2>&1 &

          for i in $(seq 1 20); do
            if curl -sf http://localhost:9000/minio/health/live; then
              echo "✅ MinIO ready"; break
            fi
            sleep 2
          done
          curl -sf http://localhost:9000/minio/health/live || \
            (cat /tmp/minio.log && exit 1)

      - name: Create MinIO buckets
        run: |
          mc alias set local http://localhost:9000 minioadmin minioadmin123
          mc mb --ignore-existing local/parquet-archive
          mc mb --ignore-existing local/cold-data
          mc ls local

      - name: Wait for ClickHouse
        run: |
          for i in $(seq 1 30); do
            if curl -sf "http://localhost:8123/ping"; then
              echo "✅ ClickHouse ready"; break
            fi
            sleep 2
          done
          curl -sf "http://localhost:8123/ping" || exit 1

      - name: Apply ClickHouse schema
        run: |
          # clickhouse-client يدعم multi-statement SQL بشكل مضمون
          clickhouse-client \
            --host localhost \
            --port 9100 \
            --user default \
            --multiquery \
            < infra/clickhouse/init.sql
          echo "✅ ClickHouse schema applied"

      - name: Run Postgres migrations
        run: |
          goose \
            -dir services/ingestion/internal/postgres/migrations \
            postgres \
            "postgres://platform:platform@localhost:5432/platform?sslmode=disable" \
            up
          echo "✅ Postgres migrations applied"

      - name: Run integration tests
        working-directory: services/ingestion
        env:
          POSTGRES_HOST:        localhost
          POSTGRES_PORT:        "5432"
          POSTGRES_DB:          platform
          POSTGRES_USER:        platform
          POSTGRES_PASSWORD:    platform
          POSTGRES_SSL_MODE:    disable
          CLICKHOUSE_HOST:      localhost
          CLICKHOUSE_PORT:      "9100"
          CLICKHOUSE_DB:        events
          CLICKHOUSE_USER:      platform
          CLICKHOUSE_PASSWORD:  platform
          MINIO_ENDPOINT:       localhost:9000
          MINIO_ACCESS_KEY:     minioadmin
          MINIO_SECRET_KEY:     minioadmin123
          MINIO_USE_SSL:        "false"
          MINIO_BUCKET_PARQUET: parquet-archive
          MINIO_PREFIX:         events
        run: |
          go test -tags=integration -v -timeout=120s \
            ./internal/clickhouse/... \
            ./internal/postgres/...
