name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-proto:
    name: Proto Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Setup buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99  # v1
        with:
          version: '1.32.2'
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Lint proto files
        working-directory: proto
        run: buf lint

  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate-alertmanager:
    name: Validate AlertManager Config
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install amtool
        run: |
          ALERTMANAGER_VERSION="0.27.0"
          curl -sSL \
            "https://github.com/prometheus/alertmanager/releases/download/v${ALERTMANAGER_VERSION}/alertmanager-${ALERTMANAGER_VERSION}.linux-amd64.tar.gz" \
            | tar -xz --strip-components=1 -C /usr/local/bin \
              "alertmanager-${ALERTMANAGER_VERSION}.linux-amd64/amtool"
          amtool --version
      - name: Extract config template from ConfigMap
        run: |
          pip install pyyaml --quiet --break-system-packages
          python3 - << 'PYEOF'
          import yaml, sys
          with open("k8s/base/monitoring/alertmanager-configmap.yaml") as f:
              doc = yaml.safe_load(f)
          template = doc.get("data", {}).get("alertmanager.yml.tmpl")
          if not template:
              print("ERROR: alertmanager.yml.tmpl not found in ConfigMap", file=sys.stderr)
              sys.exit(1)
          with open("/tmp/alertmanager.yml.tmpl", "w") as f:
              f.write(template)
          required = ["route:", "receivers:", "global:"]
          for key in required:
              if key not in template:
                  print(f"ERROR: '{key}' missing from extracted template", file=sys.stderr)
                  sys.exit(1)
          print("Template extracted successfully")
          print(f"  Size: {len(template)} chars")
          PYEOF
      - name: Render template with dummy secrets
        run: |
          export PAGERDUTY_ROUTING_KEY="dummy-pagerduty-key-for-ci-validation"
          export SLACK_WEBHOOK_URL="https://hooks.slack.com/services/dummy/for/ci"
          envsubst < /tmp/alertmanager.yml.tmpl > /tmp/alertmanager.yml
          echo "Template rendered:"
          cat /tmp/alertmanager.yml
      - name: Validate AlertManager config
        run: |
          amtool check-config /tmp/alertmanager.yml
          echo "AlertManager config is valid ✓"

