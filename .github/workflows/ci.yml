  # ── Vulnerability Scanning ────────────────────────────────────────────
  govulncheck:
    name: Go Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      matrix:
        service: [ingestion, processing, auth, billing, notifications, analytics, control-plane, developer-portal, feature-flags, realtime, search, tenant-operator, jobs]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Go 1.24
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: '1.24'
          cache-dependency-path: services/${{ matrix.service }}/go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        working-directory: services/${{ matrix.service }}
        run: |
          echo "🔍 Scanning ${{ matrix.service }} for known vulnerabilities..."
          govulncheck ./...

  # ── Go Linting (errcheck enabled) ────────────────────────────────────
  golangci-lint:
    name: GoLangCI-Lint (with errcheck)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      matrix:
        service: [ingestion, processing, auth, billing, notifications, analytics, control-plane, developer-portal, feature-flags, realtime, search, tenant-operator, jobs]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Go 1.24
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: '1.24'
          cache-dependency-path: services/${{ matrix.service }}/go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@adc3e0b5596b56d46dbb7cc68147d3172b3066cc  # v4
        with:
          version: latest
          working-directory: services/${{ matrix.service }}
          args: --enable=errcheck --timeout=10m
