# ============================================================
# generate-gosum.yml — تحديث go.sum تلقائياً
# ============================================================
name: Generate go.sum

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    name: Generate go.sum
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go 1.24
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: '1.24'
          cache-dependency-path: services/ingestion/go.mod

      - name: Generate go.sum
        working-directory: services/ingestion
        run: go mod tidy

      - name: Commit go.sum
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add services/ingestion/go.sum services/ingestion/go.mod
          git diff --staged --quiet || git commit -m "chore: regenerate go.sum [skip ci]"
          git pull --rebase origin main
          git push
