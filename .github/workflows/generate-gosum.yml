name: Generate go.sum

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: services/ingestion/go.mod

      - name: Generate go.sum
        working-directory: services/ingestion
        run: go mod tidy

      - name: Commit go.sum
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add services/ingestion/go.sum
          git diff --staged --quiet || git commit -m "chore: generate go.sum"
          git push
