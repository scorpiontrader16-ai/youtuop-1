name: Generate go.sum

on:
  workflow_dispatch:

concurrency:
  group: generate-gosum
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    name: Generate go.sum — ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      max-parallel: 1
      matrix:
        service: [analytics, auth, billing, control-plane, developer-portal, feature-flags, hydration, ingestion, jobs, notifications, realtime, search, tenant-operator]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go 1.24
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: '1.24'
          cache-dependency-path: services/${{ matrix.service }}/go.mod

      - name: Generate go.sum
        working-directory: services/${{ matrix.service }}
        run: go mod tidy

      - name: Commit go.sum
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add services/${{ matrix.service }}/go.sum services/${{ matrix.service }}/go.mod
          git diff --staged --quiet || git commit -m "chore(${{ matrix.service }}): regenerate go.sum [skip ci]"
          git pull --rebase origin main
          git push
          cache-dependency-path: services/${{ matrix.service }}/go.mod

      - name: Generate go.sum
        working-directory: services/${{ matrix.service }}
        run: go mod tidy

      - name: Commit go.sum
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add services/${{ matrix.service }}/go.sum services/${{ matrix.service }}/go.mod
          git diff --staged --quiet || git commit -m "chore(${{ matrix.service }}): regenerate go.sum [skip ci]"
          git pull --rebase origin main
          git push
          cache-dependency-path: services/${{ matrix.service }}/go.mod

      - name: Generate go.sum
        working-directory: services/${{ matrix.service }}
        run: go mod tidy

      - name: Commit go.sum
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add services/${{ matrix.service }}/go.sum services/${{ matrix.service }}/go.mod
          git diff --staged --quiet || git commit -m "chore(${{ matrix.service }}): regenerate go.sum [skip ci]"
          git pull --rebase origin main
          git push
