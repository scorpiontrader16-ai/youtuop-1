name: GitOps Validate

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'k8s/**'
      - 'infra/argocd/**'
      - 'proto/**'
      - '.github/workflows/gitops-validate.yml'
  pull_request:
    branches: [main]
    paths:
      - 'k8s/**'
      - 'infra/argocd/**'
      - 'proto/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  kustomize-build:
    name: Kustomize Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.3.0'

      - name: Build k8s/base
        run: |
          echo "=== Building k8s/base ==="
          kustomize build k8s/base

      - name: Build k8s/overlays/production
        run: |
          echo "=== Building k8s/overlays/production ==="
          if [ -f "k8s/overlays/production/kustomization.yaml" ] || \
             [ -f "k8s/overlays/production/kustomization.yml" ]; then
            kustomize build k8s/overlays/production
          else
            echo "No root kustomization in overlays/production - skipping"
          fi

  kubeval:
    name: Kubeval — Schema Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.3.0'

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin

      - name: Validate k8s/base
        run: |
          kustomize build k8s/base | kubeconform \
            --ignore-missing-schemas \
            --kubernetes-version 1.29.0 \
            --summary

      - name: Validate production overlays
        run: |
          for overlay in k8s/overlays/production/ingestion k8s/overlays/production/processing; do
            if [ -f "$overlay/kustomization.yaml" ]; then
              echo "=== Validating $overlay ==="
              kustomize build "$overlay" | kubeconform \
                --ignore-missing-schemas \
                --kubernetes-version 1.29.0 \
                --summary
            fi
          done

  argocd-validate:
    name: ArgoCD Apps Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate ArgoCD applications
        run: |
          python3 << 'PYEOF'
          import yaml, sys, os

          apps_file = "infra/argocd/apps/applications.yaml"
          if not os.path.exists(apps_file):
              print(f"WARN: {apps_file} not found - skipping")
              sys.exit(0)

          errors = []
          with open(apps_file) as f:
              docs = [d for d in yaml.safe_load_all(f) if d]

          for doc in docs:
              if not doc or doc.get('kind') != 'Application':
                  continue
              name = doc.get('metadata', {}).get('name', 'unknown')
              spec = doc.get('spec', {})
              source = spec.get('source', {})

              if not spec.get('project'):
                  errors.append(f"{name}: missing project")
              sources = spec.get('sources', [])
              has_repo = source.get('repoURL') or any(s.get('repoURL') for s in sources)
              if not has_repo:
                  errors.append(f"{name}: missing repoURL")
              if not spec.get('destination', {}).get('namespace'):
                  errors.append(f"{name}: missing destination.namespace")

              repo = source.get('repoURL', '')
              if 'your-org' in repo or 'YOUR-ORG' in repo:
                  errors.append(f"{name}: placeholder repoURL found!")

              print(f"  OK: {name}")

          if errors:
              for e in errors:
                  print(f"  ERROR: {e}")
              sys.exit(1)

          print("All ArgoCD apps valid")
          PYEOF

  proto-lint:
    name: Proto Lint & Breaking Change Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: '1.32.2'
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint proto files
        working-directory: proto
        run: buf lint

      - name: Check for breaking changes
        working-directory: proto
        run: |
          buf breaking \
            --against "https://github.com/${{ github.repository }}.git#branch=main,subdir=proto" \
            || echo "Breaking changes detected - review required"

  security-policy:
    name: Security Policy Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          required_files=(
            "SECURITY.md"
            ".github/CODEOWNERS"
            "k8s/base/kyverno/policies.yaml"
            "k8s/base/namespace-deny-all.yaml"
          )
          missing=0
          for f in "${required_files[@]}"; do
            if [ -f "$f" ]; then
              echo "  OK: $f"
            else
              echo "  MISSING: $f"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            exit 1
          fi

      - name: Check no hardcoded secrets
        run: |
          if grep -rn \
            --include="*.yaml" \
            --include="*.yml" \
            -E "(password|token)\s*:\s*['\"]?[A-Za-z0-9+/]{32,}['\"]?" \
            k8s/ infra/argocd/ 2>/dev/null \
            | grep -v "#" \
            | grep -v "secretKeyRef" \
            | grep -v "configMapKeyRef" \
            | grep -v "valueFrom" \
            | grep -v "secretName" \
            | grep -v "platform/" \
            | grep -v "secret/"; then
            echo "ERROR: Possible hardcoded secrets found!"
            exit 1
          else
            echo "OK: No hardcoded secrets found"
          fi
