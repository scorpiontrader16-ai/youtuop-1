# ============================================================
# .github/workflows/load-test.yml — Fixed
# FIX 1: BASE_URL → INGESTION_URL + PROCESSING_URL
# FIX 2: على push بدون cluster → continue-on-error: true
# ============================================================
name: Load Tests

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Test scenario'
        required: true
        type: choice
        options: [smoke, load, stress]
        default: smoke
      ingestion_url:
        description: 'Ingestion service URL'
        required: true
        default: 'http://localhost:9091'
      processing_url:
        description: 'Processing service URL'
        required: true
        default: 'http://localhost:9093'
  push:
    branches: [main]
    paths:
      - 'scripts/load-tests/**'

jobs:
  load-test:
    name: k6 — ${{ github.event.inputs.scenario || 'smoke' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Create results directory
        run: mkdir -p results

      - name: Run smoke test (always runs first)
        # FIX: على push بدون cluster حقيقي → continue-on-error: true
        # على workflow_dispatch مع URL حقيقي → continue-on-error: false
        continue-on-error: ${{ github.event_name == 'push' }}
        env:
          # FIX: INGESTION_URL بدل BASE_URL عشان يتطابق مع ingestion.js
          INGESTION_URL:  ${{ github.event.inputs.ingestion_url  || 'http://localhost:9091' }}
          PROCESSING_URL: ${{ github.event.inputs.processing_url || 'http://localhost:9093' }}
        run: |
          k6 run \
            --env SCENARIO=smoke \
            --env INGESTION_URL=$INGESTION_URL \
            --env PROCESSING_URL=$PROCESSING_URL \
            --out json=results/smoke.json \
            scripts/load-tests/ingestion.js

      - name: Run selected scenario
        if: github.event.inputs.scenario != 'smoke' && github.event_name == 'workflow_dispatch'
        env:
          INGESTION_URL:  ${{ github.event.inputs.ingestion_url  || 'http://localhost:9091' }}
          PROCESSING_URL: ${{ github.event.inputs.processing_url || 'http://localhost:9093' }}
          SCENARIO:       ${{ github.event.inputs.scenario || 'load' }}
        run: |
          k6 run \
            --env SCENARIO=$SCENARIO \
            --env INGESTION_URL=$INGESTION_URL \
            --env PROCESSING_URL=$PROCESSING_URL \
            --out json=results/${SCENARIO}.json \
            scripts/load-tests/ingestion.js

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results-${{ github.event.inputs.scenario || 'smoke' }}
          path: results/
          retention-days: 30

      - name: Post summary
        if: always()
        run: |
          echo "## k6 Load Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- Scenario    : ${{ github.event.inputs.scenario || 'smoke' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Ingestion   : ${{ github.event.inputs.ingestion_url  || 'http://localhost:9091' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Processing  : ${{ github.event.inputs.processing_url || 'http://localhost:9093' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit      : ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          if [ -f results/smoke.json ]; then
            echo "- Results     : uploaded as artifact" >> $GITHUB_STEP_SUMMARY
          fi
