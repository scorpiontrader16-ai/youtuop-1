# ============================================================
# load-test.yml — k6 Load Testing
# ============================================================
name: Load Tests

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Test scenario'
        required: true
        type: choice
        options: [smoke, load, stress]
        default: smoke
      base_url:
        description: 'Target URL'
        required: true
        default: 'http://localhost:9091'
  push:
    branches: [main]
    paths:
      - 'scripts/load-tests/**'

jobs:
  load-test:
    name: k6 — ${{ github.event.inputs.scenario || 'smoke' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Create results directory
        run: mkdir -p results

      - name: Run smoke test (always runs first)
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'http://localhost:9091' }}
        run: |
          k6 run \
            --env SCENARIO=smoke \
            --env BASE_URL=$BASE_URL \
            --out json=results/smoke.json \
            scripts/load-tests/ingestion.js
        continue-on-error: false

      - name: Run selected scenario
        if: github.event.inputs.scenario != 'smoke'
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'http://localhost:9091' }}
          SCENARIO: ${{ github.event.inputs.scenario || 'load' }}
        run: |
          k6 run \
            --env SCENARIO=$SCENARIO \
            --env BASE_URL=$BASE_URL \
            --out json=results/${SCENARIO}.json \
            scripts/load-tests/ingestion.js

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results-${{ github.event.inputs.scenario || 'smoke' }}
          path: results/
          retention-days: 30

      - name: Post summary
        if: always()
        run: |
          echo "## k6 Load Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- Scenario : ${{ github.event.inputs.scenario || 'smoke' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Target   : ${{ github.event.inputs.base_url || 'http://localhost:9091' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit   : ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          if [ -f results/smoke.json ]; then
            echo "- Results  : uploaded as artifact" >> $GITHUB_STEP_SUMMARY
          fi
