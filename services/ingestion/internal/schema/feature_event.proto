syntax = "proto3";

package platform.ingestion.v1;

// go_package يتطابق مع module path في go.mod
// الـ suffix ";schema" يحدد اسم الـ Go package المُولَّد
option go_package = "github.com/scorpiontrader16-ai/AmniX-Finance/services/ingestion/internal/schema;schema";

// FeatureEvent — يُرسَل إلى Redpanda topic "feature-events"
// يُستهلَك من ML pipeline لـ Online Learning و Feature Store
//
// NOTE: الـ Go types الحالية موجودة في feature_event.go (JSON encoding)
// عند تفعيل buf generate، سيتم استبدالها بالـ proto-generated types
message FeatureEvent {
  // معرّف فريد للحدث — يُنتَج كـ "evt-{UnixNano}"
  string event_id = 1;

  // معرّف الـ tenant — مطلوب دائماً (RLS enforcement)
  string tenant_id = 2;

  // نوع مصدر الحدث — من X-Event-Type header
  string source_type = 3;

  // Feature vector — يُملَأ من ML feature extraction pipeline
  // فارغ عند الإرسال الأولي من ingestion service
  repeated double feature_vector = 4;

  // metadata إضافية من request headers
  map<string, string> metadata = 5;

  // وقت وقوع الحدث — Unix milliseconds (UTC)
  int64 occurred_at = 6;
}
