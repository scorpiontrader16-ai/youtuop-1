# ============================================================
# youtuop-1 — Infrastructure Stack (infra only)
# للـ core services: docker-compose.services.yml
# ============================================================
# الاستخدام: make dev  أو  docker compose up -d
# ============================================================

networks:
  platform:
    driver: bridge

volumes:
  clickhouse_data:
  minio_data:
  postgres_data:
  redis_data:
  redpanda_data:
  grafana_data:

services:

  # ─────────────────────────────────────────────────────────
  # Redpanda — Kafka-compatible streaming (+ Schema Registry + Console)
  # ─────────────────────────────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:v24.3.7
    container_name: redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 1G
      - --mode dev-container
      - --default-log-level=warn
    ports:
      - "19092:19092"   # Kafka external
      - "18081:18081"   # Schema Registry external
      - "9644:9644"     # Admin API
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - platform

  redpanda-console:
    image: redpandadata/console:v2.7.2
    container_name: redpanda-console
    ports:
      - "8080:8080"     # Web Console → http://localhost:8080
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
    entrypoint: /bin/sh
    command: >
      -c "printf 'kafka:\n  brokers: [\"redpanda:9092\"]\nredpanda:\n  adminApi:\n    enabled: true\n    urls: [\"http://redpanda:9644\"]\nschemaRegistry:\n  enabled: true\n  urls: [\"http://redpanda:8081\"]\n' > /tmp/config.yml && /app/console"
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - platform

  # ─────────────────────────────────────────────────────────
  # ClickHouse — Hot Store (بيانات لحظية)
  # ─────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: clickhouse
    ports:
      - "8123:8123"   # HTTP interface → http://localhost:8123/play
      - "9100:9000"   # Native TCP (9100 عشان مايتعارضش مع MinIO)
    environment:
      CLICKHOUSE_DB: events
      CLICKHOUSE_USER: platform
      CLICKHOUSE_PASSWORD: platform
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - platform

  # ─────────────────────────────────────────────────────────
  # PostgreSQL — Warm Store (relational + pgvector)
  # ─────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d platform"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - platform

  # ─────────────────────────────────────────────────────────
  # Redis — Hot Cache
  # ─────────────────────────────────────────────────────────
  redis:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform

  # ─────────────────────────────────────────────────────────
  # MinIO — S3-compatible Cold Storage
  # ─────────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console → http://localhost:9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - platform

  minio-init:
    image: minio/mc:RELEASE.2025-02-15T16-25-17Z
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY:-minioadmin} $${MINIO_SECRET_KEY:-minioadmin123};
      mc mb --ignore-existing local/cold-data;
      mc mb --ignore-existing local/redpanda-tiered;
      mc mb --ignore-existing local/parquet-archive;
      echo 'MinIO buckets ready:';
      mc ls local;
      "
    networks:
      - platform

  # ─────────────────────────────────────────────────────────
  # OpenTelemetry Collector — Observability
  # ─────────────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: otel-collector
    ports:
      - "4317:4317"   # gRPC receiver
      - "4318:4318"   # HTTP receiver
      - "8888:8888"   # Prometheus metrics
    volumes:
      - ./scripts/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - redpanda
    networks:
      - platform

  # ─────────────────────────────────────────────────────────
  # Grafana — Dashboards
  # ─────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    ports:
      - "3000:3000"   # Web UI → http://localhost:3000
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - clickhouse
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - platform

  # ─────────────────────────────────────────────────────────
  # Ingestion Service — Go
  # ─────────────────────────────────────────────────────────
  ingestion:
    build:
      context: ./services/ingestion
      dockerfile: Dockerfile
    container_name: ingestion
    ports:
      - "8090:8090"   # gRPC
      - "9091:9091"   # HTTP
    env_file:
      - .env
    environment:
      GRPC_PORT: 8090
      HTTP_PORT: 9091
      REDPANDA_BROKERS: redpanda:9092
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
      POSTGRES_HOST: postgres
      REDIS_ADDR: redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
    depends_on:
      redpanda:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9091/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - platform

  # ─────────────────────────────────────────────────────────
  # Processing Service — Rust
  # ─────────────────────────────────────────────────────────
  processing:
    build:
      context: ./services/processing
      dockerfile: Dockerfile
    container_name: processing
    ports:
      - "50051:50051"  # gRPC
      - "9093:9093"    # HTTP metrics
    env_file:
      - .env
    environment:
      REDPANDA_BROKERS: redpanda:9092
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
    depends_on:
      redpanda:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9093/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - platform
