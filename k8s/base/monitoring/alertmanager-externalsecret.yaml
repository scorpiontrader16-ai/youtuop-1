# ╔══════════════════════════════════════════════════════════════════════╗
# ║  المسار الكامل: k8s/base/monitoring/alertmanager-externalsecret.yaml ║
# ║  الحالة: 🆕 جديد                                                    ║
# ╚══════════════════════════════════════════════════════════════════════╝
---
# ─────────────────────────────────────────────────────────────────────────────
# يجب إنشاء هذا السر في AWS Secrets Manager قبل التطبيق:
#
# aws secretsmanager create-secret \
#   --name "platform/alertmanager" \
#   --secret-string '{
#     "PAGERDUTY_ROUTING_KEY": "<your-pagerduty-routing-key>",
#     "SLACK_WEBHOOK_URL":     "<your-slack-webhook-url>"
#   }'
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-secrets
  namespace: monitoring
  labels:
    app: alertmanager
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/part-of: youtuop-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: alertmanager-secrets
    creationPolicy: Owner
  data:
    - secretKey: PAGERDUTY_ROUTING_KEY
      remoteRef:
        key: platform/alertmanager
        property: PAGERDUTY_ROUTING_KEY
    - secretKey: SLACK_WEBHOOK_URL
      remoteRef:
        key: platform/alertmanager
        property: SLACK_WEBHOOK_URL
