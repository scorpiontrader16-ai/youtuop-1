apiVersion: v1
kind: ServiceAccount
metadata:
  name: hydration
  namespace: platform
  labels:
    app: hydration
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hydration
  namespace: platform
  labels:
    app: hydration
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["hydration-secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hydration
  namespace: platform
  labels:
    app: hydration
subjects:
  - kind: ServiceAccount
    name: hydration
    namespace: platform
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: hydration
