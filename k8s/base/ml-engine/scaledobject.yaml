apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ml-engine
  namespace: platform
  labels:
    app: ml-engine
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: ml-engine
  minReplicaCount: 3
  maxReplicaCount: 10
  cooldownPeriod: 120
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://victoria-metrics.monitoring.svc.cluster.local:8428
        metricName: ml_engine_predictions_rate
        query: |
          sum(rate(ml_engine_predictions_total[2m]))
        threshold: "50"
