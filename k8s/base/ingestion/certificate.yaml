# ╔══════════════════════════════════════════════════════════════════════╗
# ║  المسار الكامل: k8s/base/ingestion/certificate.yaml                  
# ║  الحالة: 🆕 جديد                                                    ║
# ╚══════════════════════════════════════════════════════════════════════╝
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ingestion-tls
  namespace: platform
  labels:
    app: ingestion
    app.kubernetes.io/name: ingestion-tls
    app.kubernetes.io/component: pki
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/part-of: youtuop-platform
spec:
  secretName: ingestion-tls-secret
  duration: 2160h
  renewBefore: 720h
  isCA: false
  privateKey:
    algorithm: ECDSA
    encoding: PKCS8
    size: 256
    rotationPolicy: Always
  usages:
    - server auth
    - client auth
  dnsNames:
    - ingestion
    - ingestion.platform
    - ingestion.platform.svc
    - ingestion.platform.svc.cluster.local
    - ingestion-stable
    - ingestion-stable.platform
    - ingestion-stable.platform.svc
    - ingestion-stable.platform.svc.cluster.local
    - ingestion-canary
    - ingestion-canary.platform
    - ingestion-canary.platform.svc
    - ingestion-canary.platform.svc.cluster.local
  ipAddresses:
    - 127.0.0.1
  issuerRef:
    name: platform-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
