# KEDA ScaledObject — Ingestion Service
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ingestion
  namespace: platform
  annotations:
    scaledobject.keda.sh/transfer-hpa-ownership: "true"
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: ingestion
  minReplicaCount: 2
  maxReplicaCount: 20
  cooldownPeriod: 300
  triggers:
    # HTTP request rate من VictoriaMetrics
    - type: prometheus
      metadata:
        serverAddress: http://victoria-metrics.monitoring.svc.cluster.local:8428
        metricName: ingestion_http_requests_per_second
        query: |
          sum(rate(ingestion_http_requests_total[1m]))
        threshold: "100"
        activationThreshold: "10"
    # CPU backup trigger
    - type: cpu
      metricType: Utilization
      metadata:
        value: "70"
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Percent
              value: 100
              periodSeconds: 15
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Pods
              value: 1
              periodSeconds: 60
