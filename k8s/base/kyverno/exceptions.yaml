# استثناءات لـ system components تحتاج صلاحيات خاصة
apiVersion: kyverno.io/v2beta1
kind: PolicyException
metadata:
  name: system-exceptions
  namespace: kube-system
spec:
  exceptions:
    - policyName: require-non-root
      ruleNames: [check-runAsNonRoot]
    - policyName: require-readonly-rootfs
      ruleNames: [check-readonly-rootfs]
    - policyName: require-arm64-nodeselector
      ruleNames: [check-arm64-nodeselector]
    - policyName: disallow-latest-tag
      ruleNames: [check-image-tag]
  match:
    any:
      - resources:
          kinds: [Pod]
          namespaces:
            - kube-system
            - cert-manager
            - monitoring
            - argocd
            - envoy-gateway-system
            # ✏️ مُضاف — GAP-07: Vault يعمل بـ UID 100 ويحتاج write access
            # لـ Raft storage — لا يمكنه الالتزام بـ readOnlyRootFilesystem
            - vault
---
# استثناء لـ mirrormaker2 — يحتاج write access
apiVersion: kyverno.io/v2beta1
kind: PolicyException
metadata:
  name: mirrormaker2-exception
  namespace: platform
spec:
  exceptions:
    - policyName: require-readonly-rootfs
      ruleNames: [check-readonly-rootfs]
  match:
    any:
      - resources:
          kinds: [Pod]
          namespaces: [platform]
          selector:
            matchLabels:
              app: mirrormaker2
---
# H-04 Fix: PolicyException for services requiring automountServiceAccountToken
# ingestion, ml-engine, tenant-operator need SA token mounted for:
#   - Vault kubernetes auth (IRSA)
#   - AWS IRSA credentials via projected SA token
# Without this exception, Kyverno disallow-automount-sa-token policy
# blocks these pods from starting, breaking their Vault integration.
apiVersion: kyverno.io/v2beta1
kind: PolicyException
metadata:
  name: vault-irsa-automount
  namespace: platform
spec:
  exceptions:
    - policyName: disallow-automount-sa-token
      ruleNames: [check-automount-sa-token]
  match:
    any:
      - resources:
          kinds: [Pod]
          namespaces: [platform]
          selector:
            matchExpressions:
              - key: app
                operator: In
                values: [ingestion, ml-engine, tenant-operator]
