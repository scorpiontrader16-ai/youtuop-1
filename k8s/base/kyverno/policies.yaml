---
# Policy 8 — منع capabilities
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-drop-all-capabilities
  annotations:
    policies.kyverno.io/title: Require Drop All Capabilities
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-drop-capabilities
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [platform]
      validate:
        message: "يجب حذف كل الـ capabilities"
        pattern:
          spec:
            containers:
              - securityContext:
                  capabilities:
                    drop:
                      - ALL
