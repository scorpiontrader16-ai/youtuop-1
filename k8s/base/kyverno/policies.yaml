# Policy 4 — إجبار ARM64 nodeSelector
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-arm64-nodeselector
  annotations:
    policies.kyverno.io/title: Require ARM64 NodeSelector
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-arm64-nodeselector
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [platform]
      validate:
        message: "يجب تحديد kubernetes.io/arch: arm64"
        pattern:
          spec:
            nodeSelector:
              kubernetes.io/arch: arm64
---
# Policy 5 — منع :latest tag — يسمح بـ SHA digest أو semantic version (v1.2.3)
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow Latest Tag
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >
      يمنع استخدام :latest — يُسمح فقط بـ SHA digest أو semantic version مثل v1.2.3
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-image-tag
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [platform]
      validate:
        message: "لا يسمح باستخدام :latest — استخدم SHA digest (@sha256:...) أو semantic version (v1.2.3)"
        deny:
          conditions:
            any:
              - key: "{{ images.containers.*.tag }}"
                operator: AnyIn
                value: ["latest", ""]
---
# Policy 6 — إجبار resource limits
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  annotations:
    policies.kyverno.io/title: Require Resource Limits
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-resource-limits
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [platform]
      validate:
        message: "يجب تحديد cpu وmemory limits وrequests"
        pattern:
          spec:
            containers:
              - resources:
                  limits:
                    cpu: "?*"
                    memory: "?*"
                  requests:
                    cpu: "?*"
                    memory: "?*"
