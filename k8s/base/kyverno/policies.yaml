apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-image-digest
  labels:
    app.kubernetes.io/part-of: youtuop-platform
    app.kubernetes.io/managed-by: kustomize
  annotations:
    policies.kyverno.io/title: Require Image Digest
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >
      يُلزم بـ SHA digest (@sha256:...) لجميع الصور في namespace platform
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: check-image-digest
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [platform]
      validate:
        message: "الصور يجب أن تستخدم SHA digest (@sha256:...) — لا يُسمح بـ tags فقط"
        foreach:
          - list: "request.object.spec.containers"
            pattern:
              image: "*@sha256:*"
          - list: "request.object.spec.initContainers"
            pattern:
              image: "*@sha256:*"
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  labels:
    app.kubernetes.io/part-of: youtuop-platform
    app.kubernetes.io/managed-by: kustomize
  annotations:
    policies.kyverno.io/title: Require Resource Limits
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-resource-limits
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [platform]
      validate:
        message: "يجب تحديد cpu وmemory limits وrequests"
        pattern:
          spec:
            containers:
              - resources:
                  limits:
                    cpu: "?*"
                    memory: "?*"
                  requests:
                    cpu: "?*"
                    memory: "?*"
