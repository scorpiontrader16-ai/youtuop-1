# Policy 1 — منع الـ Pods من الشغل كـ root
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-non-root
  annotations:
    policies.kyverno.io/title: Require Non-Root
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >
      منع أي Pod من الشغل بصلاحيات root
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-runAsNonRoot
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [platform]
      validate:
        message: "يجب أن يشتغل الـ Pod بـ runAsNonRoot: true"
        pattern:
          spec:
            securityContext:
              runAsNonRoot: true
---
# Policy 2 — منع privilege escalation
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privilege-escalation
  annotations:
    policies.kyverno.io/title: Disallow Privilege Escalation
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >
      منع allowPrivilegeEscalation في كل containers
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-privilege-escalation
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [platform]
      validate:
        message: "allowPrivilegeEscalation يجب أن يكون false"
        pattern:
          spec:
            containers:
              - securityContext:
                  allowPrivilegeEscalation: false
---
