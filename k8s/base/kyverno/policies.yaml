apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privileged-containers
  labels:
    app.kubernetes.io/part-of: youtuop-platform
    app.kubernetes.io/managed-by: kustomize
  annotations:
    policies.kyverno.io/title: Disallow Privileged Containers
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >
      يمنع تشغيل privileged containers على مستوى الـ cluster كاملاً
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: privileged-containers
      match:
        any:
          - resources:
              kinds: [Pod]
      validate:
        message: "Privileged containers غير مسموح بها في أي namespace"
        pattern:
          spec:
            =(initContainers):
              - =(securityContext):
                  =(privileged): false
            containers:
              - =(securityContext):
                  =(privileged): false
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-host-namespaces
  labels:
    app.kubernetes.io/part-of: youtuop-platform
    app.kubernetes.io/managed-by: kustomize
  annotations:
    policies.kyverno.io/title: Disallow Host Namespaces
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >
      يمنع مشاركة hostPID وhostIPC وhostNetwork في namespace platform
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: host-namespaces
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [platform]
      validate:
        message: "مشاركة host namespaces (hostPID/hostIPC/hostNetwork) غير مسموح بها"
        pattern:
          spec:
            =(hostPID): false
            =(hostIPC): false
            =(hostNetwork): false
