apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-non-root
  labels:
    app.kubernetes.io/part-of: youtuop-platform
    app.kubernetes.io/managed-by: kustomize
  annotations:
    policies.kyverno.io/title: Require Non-Root
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >
      منع أي Pod من الشغل بصلاحيات root — يتحقق على مستوى الـ Pod والـ container معاً
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-pod-runAsNonRoot
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [platform]
      validate:
        message: "يجب أن يشتغل الـ Pod بـ spec.securityContext.runAsNonRoot: true"
        pattern:
          spec:
            securityContext:
              runAsNonRoot: true
    - name: check-container-runAsNonRoot
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [platform]
      validate:
        message: "كل container يجب أن يعمل بـ runAsNonRoot: true وrunAsUser > 0"
        pattern:
          spec:
            =(initContainers):
              - =(securityContext):
                  =(runAsNonRoot): true
            containers:
              - securityContext:
                  runAsNonRoot: true
                  runAsUser: ">0"
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privilege-escalation
  labels:
    app.kubernetes.io/part-of: youtuop-platform
    app.kubernetes.io/managed-by: kustomize
  annotations:
    policies.kyverno.io/title: Disallow Privilege Escalation
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >
      منع allowPrivilegeEscalation في كل containers
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-privilege-escalation
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [platform]
      validate:
        message: "allowPrivilegeEscalation يجب أن يكون false"
        pattern:
          spec:
            containers:
              - securityContext:
                  allowPrivilegeEscalation: false
---
