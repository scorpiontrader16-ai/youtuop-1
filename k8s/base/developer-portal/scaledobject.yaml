apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: developer-portal
  namespace: platform
  labels:
    app: developer-portal
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: developer-portal
  minReplicaCount: 0
  maxReplicaCount: 10
  cooldownPeriod: 300
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://victoria-metrics.monitoring.svc.cluster.local:8428
        metricName: developer_portal_requests_rate
        query: |
          sum(rate(developer_portal_http_request_duration_seconds_count[2m]))
        threshold: "100"
