# ╔══════════════════════════════════════════════════════════════════════╗
# ║  Full path: k8s/base/vault/certificate.yaml                         ║
# ║  Status: 🆕 New — C-01 Fix: Enable TLS for Vault                    ║
# ╚══════════════════════════════════════════════════════════════════════╝
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-tls
  namespace: vault
  labels:
    app: vault
    app.kubernetes.io/name: vault-tls
    app.kubernetes.io/component: pki
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/part-of: youtuop-platform
spec:
  secretName: vault-tls-secret
  duration: 2160h      # 90 days
  renewBefore: 720h    # 30 days (wider window than other services)
  isCA: false
  privateKey:
    algorithm: RSA
    encoding: PKCS8
    size: 2048
    rotationPolicy: Always
  usages:
    - server auth
    - client auth
  dnsNames:
    - vault
    - vault.vault
    - vault.vault.svc
    - vault.vault.svc.cluster.local
    - vault-0.vault-internal
    - vault-1.vault-internal
    - vault-2.vault-internal
    - vault-0.vault-internal.vault.svc.cluster.local
    - vault-1.vault-internal.vault.svc.cluster.local
    - vault-2.vault-internal.vault.svc.cluster.local
  ipAddresses:
    - 127.0.0.1
  issuerRef:
    name: platform-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
