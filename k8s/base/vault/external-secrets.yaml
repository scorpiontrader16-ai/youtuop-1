# k8s/base/vault/external-secrets.yaml
# ============================================================
# ClusterSecretStore فقط — يربط الـ cluster بـ Vault
#
# الـ ExternalSecrets لكل service موجودة في فولدراتها:
#   k8s/base/ingestion/externalsecret.yaml  → ingestion-secrets
#   k8s/base/processing/externalsecret.yaml → processing-secrets
#
# FIX: حذف ingestion-secrets و processing-secrets ExternalSecrets
#      كانوا مكررين مع الملفات في فولدرات الـ services
# ============================================================
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: https://vault.vault.svc.cluster.local:8200
      path: secret
      version: v2
      # C-01 Fix: Use cert-manager CA for TLS verification
      caProvider:
        type: Secret
        name: vault-tls-secret
        namespace: vault
        key: ca.crt
      auth:
        kubernetes:
          mountPath: kubernetes
          role: platform-services
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
