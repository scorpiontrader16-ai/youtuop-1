apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth
  namespace: platform
  labels:
    app: auth
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: auth
  namespace: platform
  labels:
    app: auth
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["auth-secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: auth
  namespace: platform
  labels:
    app: auth
subjects:
  - kind: ServiceAccount
    name: auth
    namespace: platform
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: auth
