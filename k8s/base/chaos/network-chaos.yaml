# k8s/base/chaos/network-chaos.yaml
# Chaos Mesh — Network Experiments
# تشغيل يدوي فقط — مش automatic في production

# ── Experiment 1: Network Delay (Processing → Ingestion) ────────────────
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: processing-latency
  namespace: platform
  labels:
    chaos-type: network
    component: processing
spec:
  action: delay
  mode: one
  selector:
    namespaces:
      - platform
    labelSelectors:
      app: processing
  delay:
    latency: "200ms"
    correlation: "25"
    jitter: "50ms"
  direction: to
  target:
    mode: one
    selector:
      namespaces:
        - platform
      labelSelectors:
        app: ingestion
  duration: "5m"
  scheduler:
    cron: "@manual"
---
# ── Experiment 2: Packet Loss ────────────────────────────────────────────
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: redpanda-packet-loss
  namespace: platform
  labels:
    chaos-type: network
    component: redpanda
spec:
  action: loss
  mode: one
  selector:
    namespaces:
      - platform
    labelSelectors:
      app: ingestion
  loss:
    loss: "10"
    correlation: "25"
  direction: to
  target:
    mode: all
    selector:
      namespaces:
        - platform
      labelSelectors:
        app: redpanda
  duration: "3m"
  scheduler:
    cron: "@manual"
---
# ── Experiment 3: Pod Failure ─────────────────────────────────────────────
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: processing-pod-kill
  namespace: platform
  labels:
    chaos-type: pod
    component: processing
spec:
  action: pod-kill
  mode: one
  selector:
    namespaces:
      - platform
    labelSelectors:
      app: processing
  gracePeriod: 0
  scheduler:
    cron: "@manual"
---
# ── Experiment 4: CPU Stress ──────────────────────────────────────────────
apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: ingestion-cpu-stress
  namespace: platform
  labels:
    chaos-type: stress
    component: ingestion
spec:
  mode: one
  selector:
    namespaces:
      - platform
    labelSelectors:
      app: ingestion
  stressors:
    cpu:
      workers: 2
      load: 80
  duration: "3m"
  scheduler:
    cron: "@manual"
---
# ── Chaos Schedule: Weekly Resilience Test ────────────────────────────────
apiVersion: chaos-mesh.org/v1alpha1
kind: Schedule
metadata:
  name: weekly-resilience-test
  namespace: platform-staging
  labels:
    chaos-type: schedule
spec:
  schedule: "0 2 * * 2"
  type: NetworkChaos
  networkChaos:
    action: delay
    mode: one
    selector:
      namespaces:
        - platform-staging
      labelSelectors:
        app: processing
    delay:
      latency: "100ms"
      jitter: "20ms"
    direction: both
    duration: "10m"
