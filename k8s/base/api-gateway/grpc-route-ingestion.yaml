apiVersion: gateway.networking.k8s.io/v1alpha2
kind: GRPCRoute
metadata:
  name: ingestion-grpc
  namespace: platform
  labels:
    app.kubernetes.io/name: ingestion
    app.kubernetes.io/component: api-gateway
spec:
  parentRefs:
    - name: platform-gateway
      namespace: platform
      sectionName: grpc
  hostnames:
    - "ingestion.platform.internal"
  rules:
    # ── كل الـ gRPC methods على الـ ingestion service ──────────
    - matches:
        - method:
            service: platform.ingestion.v1.IngestionService
      backendRefs:
        - name: ingestion-stable
          port: 8090
          weight: 90
        - name: ingestion-canary
          port: 8090
          weight: 10
    # ── Health check ────────────────────────────────────────────
    - matches:
        - method:
            service: grpc.health.v1.Health
      backendRefs:
        - name: ingestion-stable
          port: 8090
