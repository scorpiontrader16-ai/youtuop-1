---
# ── Feature Flags Public API (JWT protected) ─────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: feature-flags-routes
  namespace: platform
  labels:
    app.kubernetes.io/name: feature-flags
    app.kubernetes.io/component: api-gateway
spec:
  parentRefs:
    - name: platform-gateway
      namespace: platform
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/flags
      backendRefs:
        - name: feature-flags-stable
          port: 9096
          weight: 90
        - name: feature-flags-canary
          port: 9096
          weight: 10

---
# ── Feature Flags Admin API (super_admin only) ────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: feature-flags-admin-routes
  namespace: platform
  labels:
    app.kubernetes.io/name: feature-flags
    app.kubernetes.io/component: api-gateway
spec:
  parentRefs:
    - name: platform-gateway
      namespace: platform
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/admin/flags
      backendRefs:
        - name: feature-flags-stable
          port: 9096
          weight: 90
        - name: feature-flags-canary
          port: 9096
          weight: 10
