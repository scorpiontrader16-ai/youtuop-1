apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: platform-gateway
  namespace: platform
  labels:
    app.kubernetes.io/name: platform-gateway
    app.kubernetes.io/component: api-gateway
spec:
  gatewayClassName: envoy-gateway
  listeners:
    # ── HTTPS / gRPC-Web ────────────────────────────────────────
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - name: platform-tls
            namespace: platform
      allowedRoutes:
        namespaces:
          from: Same

    # ── HTTP → redirect to HTTPS ────────────────────────────────
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same

    # ── gRPC native (internal) ──────────────────────────────────
    - name: grpc
      protocol: HTTPS
      port: 8443
      tls:
        mode: Terminate
        certificateRefs:
          - name: platform-tls
            namespace: platform
      allowedRoutes:
        namespaces:
          from: Same
