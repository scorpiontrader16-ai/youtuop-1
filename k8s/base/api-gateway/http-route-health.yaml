apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: health-routes
  namespace: platform
  labels:
    app.kubernetes.io/component: api-gateway
spec:
  parentRefs:
    - name: platform-gateway
      namespace: platform
      sectionName: https
  rules:
    # ── HTTP → HTTPS redirect ───────────────────────────────────
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
    # ── Ingestion health (:9091 HTTP port) ─────────────────────
    - matches:
        - path:
            type: Exact
            value: /healthz/ingestion
      backendRefs:
        - name: ingestion-stable
          port: 9091
    # ── Processing health (:9093 metrics/health port) ───────────
    - matches:
        - path:
            type: Exact
            value: /healthz/processing
      backendRefs:
        - name: processing-stable
          port: 9093
    # ── Auth health (:9092 HTTP port) ───────────────────────────
    - matches:
        - path:
            type: Exact
            value: /healthz/auth
      backendRefs:
        - name: auth-stable
          port: 9092
