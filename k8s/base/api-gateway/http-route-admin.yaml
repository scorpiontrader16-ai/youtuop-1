apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: admin-routes
  namespace: platform
  labels:
    app.kubernetes.io/name: control-plane
    app.kubernetes.io/component: api-gateway
spec:
  parentRefs:
    - name: platform-gateway
      namespace: platform
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/admin
      backendRefs:
        - name: control-plane-stable
          port: 9095
          weight: 90
        - name: control-plane-canary
          port: 9095
          weight: 10
