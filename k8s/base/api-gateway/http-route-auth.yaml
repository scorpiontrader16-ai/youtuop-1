apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: auth-routes
  namespace: platform
  labels:
    app.kubernetes.io/name: auth
    app.kubernetes.io/component: api-gateway
spec:
  parentRefs:
    - name: platform-gateway
      namespace: platform
      sectionName: https
  rules:
    # ── JWKS — public endpoint — الـ services التانية بتجيب الـ public key ─
    - matches:
        - path:
            type: Exact
            value: /.well-known/jwks.json
          method: GET
      backendRefs:
        - name: auth-stable
          port: 9092
    # ── Login ───────────────────────────────────────────────────
    - matches:
        - path:
            type: Exact
            value: /v1/auth/login
          method: POST
      backendRefs:
        - name: auth-stable
          port: 9092
          weight: 90
        - name: auth-canary
          port: 9092
          weight: 10
    # ── Refresh token ────────────────────────────────────────────
    - matches:
        - path:
            type: Exact
            value: /v1/auth/refresh
          method: POST
      backendRefs:
        - name: auth-stable
          port: 9092
          weight: 90
        - name: auth-canary
          port: 9092
          weight: 10
    # ── Logout ───────────────────────────────────────────────────
    - matches:
        - path:
            type: Exact
            value: /v1/auth/logout
          method: POST
      backendRefs:
        - name: auth-stable
          port: 9092
          weight: 90
        - name: auth-canary
          port: 9092
          weight: 10
