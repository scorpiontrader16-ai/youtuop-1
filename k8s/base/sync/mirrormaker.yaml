# ============================================================
# k8s/base/sync/mirrormaker.yaml
# Redpanda MirrorMaker 2 — Cross-Region Results Sync
#
# يشتغل في الـ secondary region (eu-west-1)
# بيـ sync الـ processed results من primary (us-east-1) → secondary
# مش بيـ sync الـ raw events — processed results فقط
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mirrormaker
  namespace: platform
  labels:
    app: mirrormaker
automountServiceAccountToken: false
---
# ── Secrets من Vault عبر External Secrets ────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mirrormaker-secrets
  namespace: platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: mirrormaker-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: platform/mirrormaker
---
# ── MirrorMaker 2 Deployment ──────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mirrormaker
  namespace: platform
  labels:
    app: mirrormaker
    component: cross-region-sync
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mirrormaker
  template:
    metadata:
      labels:
        app: mirrormaker
        component: cross-region-sync
    spec:
      serviceAccountName: mirrormaker

      nodeSelector:
        kubernetes.io/arch: arm64

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      # يتوزع على AZs مختلفة للـ HA
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: mirrormaker

      containers:
        - name: mirrormaker
          image: redpandadata/redpanda:v23.3.11
          command:
            - rpk
            - connect
            - mirror
            - --source-brokers=$(SOURCE_BROKERS)
            - --destination-brokers=$(DESTINATION_BROKERS)
            - --topics=market-events-processed
            - --consumer-group=mirrormaker-sync
            - --replication-factor=3
          env:
            # Primary region brokers (us-east-1)
            - name: SOURCE_BROKERS
              valueFrom:
                secretKeyRef:
                  name: mirrormaker-secrets
                  key: source_brokers
            # Secondary region brokers (eu-west-1 — local)
            - name: DESTINATION_BROKERS
              value: "redpanda.platform.svc.cluster.local:9092"
            # SASL auth للـ source
            - name: SOURCE_SASL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mirrormaker-secrets
                  key: source_sasl_username
            - name: SOURCE_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mirrormaker-secrets
                  key: source_sasl_password
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            exec:
              command:
                - rpk
                - cluster
                - info
                - --brokers=$(DESTINATION_BROKERS)
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - rpk
                - cluster
                - info
                - --brokers=$(DESTINATION_BROKERS)
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3

      # Restart policy — يعيد المحاولة لو فشل
      restartPolicy: Always

---
# ── PodDisruptionBudget — يضمن إن واحد على الأقل شغال ──
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mirrormaker
  namespace: platform
  labels:
    app: mirrormaker
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: mirrormaker
