apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: vault-issuer
spec:
  vault:
    server: http://vault.vault.svc.cluster.local:8200
    path: pki/sign/platform-services
    auth:
      kubernetes:
        role: cert-manager
        mountPath: /v1/auth/kubernetes
        serviceAccountRef:
          name: cert-manager
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ingestion-tls
  namespace: platform
spec:
  secretName: ingestion-tls
  duration: 24h
  renewBefore: 8h
  issuerRef:
    name: vault-issuer
    kind: ClusterIssuer
  dnsNames:
    - ingestion.platform.svc.cluster.local
    - ingestion.platform.svc
    - ingestion
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: processing-tls
  namespace: platform
spec:
  secretName: processing-tls
  duration: 24h
  renewBefore: 8h
  issuerRef:
    name: vault-issuer
    kind: ClusterIssuer
  dnsNames:
    - processing.platform.svc.cluster.local
    - processing.platform.svc
    - processing
