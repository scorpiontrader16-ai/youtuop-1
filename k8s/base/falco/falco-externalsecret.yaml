# ╔══════════════════════════════════════════════════════════════════════╗
# ║  Full path: k8s/base/falco/falco-externalsecret.yaml                ║
# ║  Status: 🆕 New                                                      ║
# ╚══════════════════════════════════════════════════════════════════════╝
#
# ─────────────────────────────────────────────────────────────────────────────
# يجب إنشاء هذا السر في AWS Secrets Manager قبل التطبيق:
#
# aws secretsmanager create-secret \
#   --name "platform/falco" \
#   --secret-string '{
#     "SLACK_WEBHOOK_URL": "<your-slack-webhook-url>"
#   }'
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: falco-secrets
  namespace: falco
  labels:
    app.kubernetes.io/name: falco
    app.kubernetes.io/component: runtime-security
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/part-of: youtuop-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: falco-secrets
    creationPolicy: Owner
  data:
    - secretKey: SLACK_WEBHOOK_URL
      remoteRef:
        key: platform/falco
        property: SLACK_WEBHOOK_URL
