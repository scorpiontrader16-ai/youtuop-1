apiVersion: v1
kind: Service
metadata:
  name: analytics-stable
  namespace: platform
  labels:
    app: analytics
    rollout: stable
spec:
  selector:
    app: analytics
  ports:
    - name: http
      port: 9096
      targetPort: 9096
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-canary
  namespace: platform
  labels:
    app: analytics
    rollout: canary
spec:
  selector:
    app: analytics
  ports:
    - name: http
      port: 9096
      targetPort: 9096
