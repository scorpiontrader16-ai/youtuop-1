apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: analytics
  namespace: platform
spec:
  scaleTargetRef:
    name: analytics
  minReplicaCount: 0
  maxReplicaCount: 10
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://victoria-metrics.monitoring.svc.cluster.local:8428
        metricName: analytics_requests_per_second
        query: sum(rate(analytics_http_requests_total[2m]))
        threshold: "50"
