apiVersion: v1
kind: ServiceAccount
metadata:
  name: analytics
  namespace: platform
  labels:
    app: analytics
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: analytics
  namespace: platform
  labels:
    app: analytics
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["analytics-secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: analytics
  namespace: platform
  labels:
    app: analytics
subjects:
  - kind: ServiceAccount
    name: analytics
    namespace: platform
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: analytics
