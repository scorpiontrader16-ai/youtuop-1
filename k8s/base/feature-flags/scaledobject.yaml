apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: feature-flags
  namespace: platform
  labels:
    app: feature-flags
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: feature-flags
  minReplicaCount: 0
  maxReplicaCount: 15
  cooldownPeriod: 60
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://victoria-metrics.monitoring.svc.cluster.local:8428
        metricName: feature_flags_requests_rate
        query: |
          sum(rate(feature_flags_http_request_duration_seconds_count[2m]))
        threshold: "500"
