# k8s/base/data-quality/externalsecret.yaml
# لماذا: deployment يستخدم secretKeyRef على data-quality-secrets
#        ESO يجلب القيم من AWS Secrets Manager ويخلق الـ Secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: data-quality-secrets
  namespace: platform
  labels:
    app.kubernetes.io/name: data-quality
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/part-of: youtuop-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: data-quality-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: platform/data-quality
