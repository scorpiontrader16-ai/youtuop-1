apiVersion: v1
kind: ServiceAccount
metadata:
  name: tenant-operator
  namespace: platform
  labels:
    app: tenant-operator
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tenant-operator
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create", "update"]  # H-03 Fix: removed delete
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["tenant-operator-secrets"]  # H-03 Fix: restricted to specific secret
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tenant-operator
subjects:
  - kind: ServiceAccount
    name: tenant-operator
    namespace: platform
roleRef:
  kind: ClusterRole
  name: tenant-operator
  apiGroup: rbac.authorization.k8s.io
