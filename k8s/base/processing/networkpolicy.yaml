apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: processing
  namespace: platform
  labels:
    app: processing
spec:
  podSelector:
    matchLabels:
      app: processing
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # ── من API Gateway فقط للـ health checks ───────────────────
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
      ports:
        - port: 50051
          protocol: TCP
    # ── من monitoring فقط للـ metrics ──────────────────────────
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9090
          protocol: TCP
    # ── لا ingress من ingestion مباشرة ─────────────────────────
    # processing يقرأ من Redpanda فقط — Event-Driven صارم

  egress:
    # ── Redpanda فقط — يقرأ ويكتب النتائج ──────────────────────
    - to:
        - podSelector:
            matchLabels:
              app: redpanda
      ports:
        - port: 9092
          protocol: TCP
    # ── OTel للـ tracing ────────────────────────────────────────
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
        - podSelector:
            matchLabels:
              app: otel-collector
      ports:
        - port: 4317
          protocol: TCP
    # ── DNS ─────────────────────────────────────────────────────
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
```

---

## ملخص المحور 4

| الملف | الحالة | ما تغير |
|-------|--------|---------|
| `k8s/base/ingestion/networkpolicy.yaml` | معدّل | حذف direct call لـ processing، إضافة envoy-gateway |
| `k8s/base/processing/networkpolicy.yaml` | معدّل | حذف ingress من ingestion، إضافة envoy-gateway |

**القاعدة الآن:**
```
Client → API Gateway → Ingestion → Redpanda → Processing
                                      ↑
                              لا direct calls
