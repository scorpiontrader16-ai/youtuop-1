apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: processing
  namespace: platform
  labels:
    app: processing
spec:
  podSelector:
    matchLabels:
      app: processing
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # ── من API Gateway فقط (gRPC :50051) ───────────────────
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
      ports:
        - port: 50051
          protocol: TCP
    # ── من monitoring للـ metrics scraping (:9093) ─────────
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9093
          protocol: TCP
  egress:
    # ── Redpanda فقط — Event-Driven architecture ───────────
    - to:
        - podSelector:
            matchLabels:
              app: redpanda
      ports:
        - port: 9092
          protocol: TCP
    # ── OTel Collector للـ tracing ─────────────────────────
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
        - podSelector:
            matchLabels:
              app: otel-collector
      ports:
        - port: 4317
          protocol: TCP
    # ── DNS ────────────────────────────────────────────────
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
