apiVersion: v1
kind: ServiceAccount
metadata:
  name: processing
  namespace: platform
  labels:
    app: processing
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: processing
  namespace: platform
  labels:
    app: processing
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["processing-secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: processing
  namespace: platform
  labels:
    app: processing
subjects:
  - kind: ServiceAccount
    name: processing
    namespace: platform
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: processing
