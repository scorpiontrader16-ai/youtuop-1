apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: processing
  namespace: platform
  labels:
    app: processing
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: processing
  template:
    metadata:
      labels:
        app: processing
    spec:
      serviceAccountName: processing
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      # ── Topology Spread — توزيع الـ pods على الـ AZs ─────────
      # يمنع إن الـ pods كلها تيجي في AZ واحدة
      # لو AZ وقعت — الـ service لسه شغالة من الـ AZs التانية
      topologySpreadConstraints:
        # AZ-level spread
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: processing
        # Node-level spread
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: processing

      # ── Affinity — يفضّل نفس الـ AZ زي Redpanda عشان يقلل cross-AZ traffic
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: topology.kubernetes.io/zone
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [redpanda]
        # لا تحط 2 processing pods على نفس الـ node
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app: processing

      containers:
        - name: processing
          # الـ image tag بيتحدث تلقائياً من release.yml workflow
          image: ghcr.io/scorpiontrader16-ai/youtuop-1/processing:1.0.0
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
            - name: metrics
              containerPort: 9093
              protocol: TCP
          env:
            - name: GRPC_PORT
              value: "50051"
            - name: METRICS_PORT
              value: "9093"
            - name: REDPANDA_BROKERS
              value: redpanda:9092
            - name: KAFKA_GROUP_ID
              value: processing-consumer
            - name: KAFKA_TOPIC
              value: market-events
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: otel-collector:4317
            - name: RUST_LOG
              value: info
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9093
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9093
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

  # ── Canary Strategy ──────────────────────────────────────
  strategy:
    canary:
      canaryService: processing-canary
      stableService: processing-stable
      steps:
        - setWeight: 10
        - pause:
            duration: 3m
        - analysis:
            templates:
              - templateName: grpc-error-rate-check
        - setWeight: 50
        - pause:
            duration: 5m
        - analysis:
            templates:
              - templateName: grpc-error-rate-check
              - templateName: grpc-latency-check
        - setWeight: 100
      autoPromotionEnabled: false

---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: grpc-error-rate-check
  namespace: platform
spec:
  metrics:
    - name: grpc-error-rate
      interval: 60s
      failureLimit: 3
      provider:
        prometheus:
          address: http://victoria-metrics.monitoring.svc.cluster.local:8428
          query: |
            sum(rate(processing_grpc_requests_total{status!="OK"}[2m]))
            /
            sum(rate(processing_grpc_requests_total[2m]))
      successCondition: result[0] < 0.01

---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: grpc-latency-check
  namespace: platform
spec:
  metrics:
    - name: p99-latency
      interval: 60s
      failureLimit: 3
      provider:
        prometheus:
          address: http://victoria-metrics.monitoring.svc.cluster.local:8428
          query: |
            histogram_quantile(0.99,
              sum(rate(processing_grpc_request_duration_seconds_bucket[2m]))
              by (le)
            )
      successCondition: result[0] < 1.0
