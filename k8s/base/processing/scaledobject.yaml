# KEDA ScaledObject — Processing Service
# يتسكل بناءً على Kafka consumer lag في Redpanda
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: processing
  namespace: platform
  annotations:
    scaledobject.keda.sh/transfer-hpa-ownership: "true"
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: processing
  minReplicaCount: 0
  maxReplicaCount: 10
  cooldownPeriod: 300
  triggers:
    # Kafka consumer lag — المقياس الرئيسي
    - type: kafka
      metadata:
        bootstrapServers: redpanda.platform.svc.cluster.local:9092
        consumerGroup: processing-consumer
        topic: market-events
        lagThreshold: "1000"
        offsetResetPolicy: latest
    # CPU backup trigger
    - type: cpu
      metricType: Utilization
      metadata:
        value: "75"
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Percent
              value: 100
              periodSeconds: 15
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Pods
              value: 1
              periodSeconds: 60
