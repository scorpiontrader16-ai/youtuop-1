apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: notifications
  namespace: platform
  labels:
    app: notifications
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: notifications
  template:
    metadata:
      labels:
        app: notifications
    spec:
      serviceAccountName: notifications
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: notifications
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: notifications
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app: notifications
      containers:
        - name: notifications
          image: ghcr.io/scorpiontrader16-ai/youtuop-1/notifications:1.0.0
          ports:
            - name: http
              containerPort: 9094
              protocol: TCP
          env:
            - name: HTTP_PORT
              value: "9094"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: otel-collector:4317
            - name: EMAIL_FROM_NAME
              value: "youtuop Platform"
            - name: EMAIL_FROM_ADDR
              value: "noreply@youtuop-1.com"
          envFrom:
            - secretRef:
                name: notifications-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9094
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9094
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
  strategy:
    canary:
      canaryService: notifications-canary
      stableService: notifications-stable
      trafficRouting:
        nginx:
          stableIngress: notifications-stable
      steps:
        - setWeight: 10
        - pause:
            duration: 2m
        - analysis:
            templates:
              - templateName: notifications-error-rate-check
        - setWeight: 50
        - pause:
            duration: 5m
        - analysis:
            templates:
              - templateName: notifications-error-rate-check
        - setWeight: 100
      autoPromotionEnabled: false

---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: notifications-error-rate-check
  namespace: platform
spec:
  metrics:
    - name: error-rate
      interval: 60s
      failureLimit: 3
      provider:
        prometheus:
          address: http://victoria-metrics.monitoring.svc.cluster.local:8428
          query: |
            sum(rate(notifications_emails_sent_total{status="failed"}[2m]))
            /
            sum(rate(notifications_emails_sent_total[2m]))
      successCondition: result[0] < 0.05
