apiVersion: v1
kind: Service
metadata:
  name: search-stable
  namespace: platform
  labels:
    app: search
    rollout: stable
spec:
  selector:
    app: search
  ports:
    - name: grpc
      port: 8095
      targetPort: 8095
    - name: http
      port: 9095
      targetPort: 9095
---
apiVersion: v1
kind: Service
metadata:
  name: search-canary
  namespace: platform
  labels:
    app: search
    rollout: canary
spec:
  selector:
    app: search
  ports:
    - name: grpc
      port: 8095
      targetPort: 8095
    - name: http
      port: 9095
      targetPort: 9095
