apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: jobs
  namespace: platform
spec:
  scaleTargetRef:
    name: jobs
  minReplicaCount: 0
  maxReplicaCount: 10
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://victoria-metrics.monitoring.svc.cluster.local:8428
        metricName: jobs_queue_length
        query: sum(redis_queue_length)
        threshold: "50"
