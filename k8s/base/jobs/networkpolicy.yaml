apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jobs
  namespace: platform
spec:
  podSelector:
    matchLabels:
      app: jobs
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
          podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - port: 9097
          protocol: TCP
    # ── من monitoring للـ metrics scraping ─────────────────
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9097
          protocol: TCP
        - port: 8097
          protocol: TCP
