apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: jobs-tls
  namespace: platform
  labels:
    app: jobs
    app.kubernetes.io/name: jobs-tls
    app.kubernetes.io/component: pki
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/part-of: youtuop-platform
spec:
  secretName: jobs-tls-secret
  duration: 2160h
  renewBefore: 720h
  isCA: false
  privateKey:
    algorithm: ECDSA
    encoding: PKCS8
    size: 256
    rotationPolicy: Always
  usages:
    - server auth
    - client auth
  dnsNames:
    - jobs
    - jobs.platform
    - jobs.platform.svc
    - jobs.platform.svc.cluster.local
    - jobs-stable
    - jobs-stable.platform
    - jobs-stable.platform.svc
    - jobs-stable.platform.svc.cluster.local
    - jobs-canary
    - jobs-canary.platform
    - jobs-canary.platform.svc
    - jobs-canary.platform.svc.cluster.local
  ipAddresses:
    - 127.0.0.1
  issuerRef:
    name: platform-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
