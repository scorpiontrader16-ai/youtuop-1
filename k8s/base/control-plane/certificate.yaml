apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: control-plane-tls
  namespace: platform
  labels:
    app: control-plane
    app.kubernetes.io/name: control-plane-tls
    app.kubernetes.io/component: pki
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/part-of: youtuop-platform
spec:
  secretName: control-plane-tls-secret
  duration: 2160h
  renewBefore: 360h
  isCA: false
  privateKey:
    algorithm: ECDSA
    encoding: PKCS8
    size: 256
    rotationPolicy: Always
  usages:
    - server auth
    - client auth
  dnsNames:
    - control-plane
    - control-plane.platform
    - control-plane.platform.svc
    - control-plane.platform.svc.cluster.local
    - control-plane-stable
    - control-plane-stable.platform
    - control-plane-stable.platform.svc
    - control-plane-stable.platform.svc.cluster.local
    - control-plane-canary
    - control-plane-canary.platform
    - control-plane-canary.platform.svc
    - control-plane-canary.platform.svc.cluster.local
  ipAddresses:
    - 127.0.0.1
  issuerRef:
    name: platform-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
