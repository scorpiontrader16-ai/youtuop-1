apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: control-plane
  namespace: platform
  labels:
    app: control-plane
spec:
  scaleTargetRef:
    name: control-plane
  minReplicaCount: 0
  maxReplicaCount: 1
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://victoria-metrics.monitoring.svc.cluster.local:8428
        metricName: control_plane_requests_per_second
        query: sum(rate(control_plane_http_requests_total[2m]))
        threshold: "1000"
