apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: control-plane
  namespace: platform
  labels:
    app: control-plane
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
    spec:
      serviceAccountName: control-plane
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: control-plane
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: control-plane
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app: control-plane
      volumes:
        - name: legal-pages
          configMap:
            name: legal-pages
      containers:
        - name: control-plane
          image: ghcr.io/scorpiontrader16-ai/youtuop-1/control-plane:1.0.0
          ports:
            - name: grpc
              containerPort: 8093
              protocol: TCP
            - name: http
              containerPort: 9093
              protocol: TCP
          volumeMounts:
            - name: legal-pages
              mountPath: /app/legal
              readOnly: true
          env:
            - name: GRPC_PORT
              value: "8093"
            - name: HTTP_PORT
              value: "9093"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: otel-collector:4317
          envFrom:
            - secretRef:
                name: control-plane-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9093
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9093
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
  strategy:
    canary:
      canaryService: control-plane-canary
      stableService: control-plane-stable
      trafficRouting:
        nginx:
          stableIngress: control-plane-stable
      steps:
        - setWeight: 10
        - pause:
            duration: 2m
        - analysis:
            templates:
              - templateName: control-plane-error-rate-check
        - setWeight: 50
        - pause:
            duration: 5m
        - analysis:
            templates:
              - templateName: control-plane-error-rate-check
              - templateName: control-plane-latency-check
        - setWeight: 100
      autoPromotionEnabled: false

---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: control-plane-error-rate-check
  namespace: platform
spec:
  metrics:
    - name: error-rate
      interval: 60s
      failureLimit: 3
      provider:
        prometheus:
          address: http://victoria-metrics.monitoring.svc.cluster.local:8428
          query: |
            sum(rate(control_plane_http_requests_total{status=~"5.*"}[2m]))
            /
            sum(rate(control_plane_http_requests_total[2m]))
      successCondition: result[0] < 0.01

---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: control-plane-latency-check
  namespace: platform
spec:
  metrics:
    - name: p99-latency
      interval: 60s
      failureLimit: 3
      provider:
        prometheus:
          address: http://victoria-metrics.monitoring.svc.cluster.local:8428
          query: |
            histogram_quantile(0.99,
              sum(rate(control_plane_http_request_duration_seconds_bucket[2m]))
              by (le)
            )
      successCondition: result[0] < 0.5