# ─────────────────────────────────────────────────────────────────────────────
# analytics service — Go 1.24
# ذاكرة أعلى: معالجة بيانات ضخمة + aggregations
# الـ image tag يتحدث تلقائياً من release.yml workflow
# لا تعدّل newTag يدوياً
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: platform
resources:
  - ../../../base/analytics
images:
  - name: ghcr.io/scorpiontrader16-ai/youtuop-1/analytics
    newTag: "1.0.0"
patches:
  - target:
      kind: Rollout
      name: analytics
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "200m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "2Gi"
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          kubernetes.io/arch: arm64
      - op: add
        path: /spec/template/spec/tolerations
        value:
          - key: "kubernetes.io/arch"
            operator: "Equal"
            value: "arm64"
            effect: "NoSchedule"
