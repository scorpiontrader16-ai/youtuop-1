# ============================================================
# overlays/production/ingestion/kustomization.yaml
# الـ image tag بيتحدث تلقائياً من release.yml workflow
# ============================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: platform
resources:
  - ../../../base/ingestion
# الـ image tag بيتحدث تلقائياً من release.yml
# لا تعدّل :latest يدوياً — استخدم semantic version أو SHA digest
images:
  - name: ghcr.io/scorpiontrader16-ai/youtuop-1/ingestion
    newTag: "1.0.117"
patches:
  - target:
      kind: Rollout
      name: ingestion
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "200m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1"
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          kubernetes.io/arch: arm64
      - op: add
        path: /spec/template/spec/tolerations
        value:
          - key: "kubernetes.io/arch"
            operator: "Equal"
            value: "arm64"
            effect: "NoSchedule"
