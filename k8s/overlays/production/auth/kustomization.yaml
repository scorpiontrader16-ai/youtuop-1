# ╔══════════════════════════════════════════════════════════════════════╗
# ║  Full path: k8s/overlays/production/auth/kustomization.yaml         ║
# ║  Status: 🆕 New                                                      ║
# ╚══════════════════════════════════════════════════════════════════════╝
# ─────────────────────────────────────────────────────────────────────────────
# auth service — Go 1.22 (special — not 1.24)
# 3 replicas: critical service — JWT + sessions + MFA + RBAC
# Port: 9092 (confirmed from http-route-auth.yaml)
# الـ image tag يتحدث تلقائياً من release.yml workflow
# لا تعدّل newTag يدوياً
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: platform
resources:
  - ../../../base/auth
images:
  - name: ghcr.io/scorpiontrader16-ai/youtuop-1/auth
    newTag: "1.0.0"
patches:
  - target:
      kind: Rollout
      name: auth
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "150m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "750m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "128Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          kubernetes.io/arch: arm64
      - op: add
        path: /spec/template/spec/tolerations
        value:
          - key: "kubernetes.io/arch"
            operator: "Equal"
            value: "arm64"
            effect: "NoSchedule"
