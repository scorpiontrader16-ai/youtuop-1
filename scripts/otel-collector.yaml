# ─────────────────────────────────────────────────────────────────────────────
# OpenTelemetry Collector — Local Development
# Pipeline: Traces→debug | Metrics→prometheus | Logs→debug
# ─────────────────────────────────────────────────────────────────────────────

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  prometheus:
    config:
      scrape_configs:
        - job_name: processing
          scrape_interval: 15s
          static_configs:
            - targets: ["processing:9093"]
              labels:
                service: processing
        - job_name: ingestion
          scrape_interval: 15s
          static_configs:
            - targets: ["ingestion:9091"]
              labels:
                service: ingestion

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64
  resource:
    attributes:
      - key: deployment.environment
        value: local
        action: upsert
      - key: platform
        value: youtuop
        action: upsert

exporters:
  debug:
    verbosity: basic
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: otelcol

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777

service:
  extensions: [health_check, pprof]
  pipelines:
    traces:
      receivers:  [otlp]
      processors: [memory_limiter, resource, batch]
      exporters:  [debug]
    metrics:
      receivers:  [otlp, prometheus]
      processors: [memory_limiter, resource, batch]
      exporters:  [prometheus]
    logs:
      receivers:  [otlp]
      processors: [memory_limiter, resource, batch]
      exporters:  [debug]
