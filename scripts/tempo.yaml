# ─────────────────────────────────────────────────────────────────────────────
# Tempo — Local Development Config
#
# Architecture:
#   Services → OTel Collector (:4317) → Tempo (:4317 internal)
#
# الـ Tempo بيستقبل من OTel Collector فقط — مش مباشرة من الـ services
# عشان مفيش تعارض في البورتات مع الـ OTel Collector
# ─────────────────────────────────────────────────────────────────────────────
stream_over_http_enabled: true

server:
  http_listen_port: 3200
  grpc_listen_port: 9095
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        # Tempo يستقبل على ports داخلية مختلفة عن OTel Collector
        # OTel Collector بيستخدم 4317/4318 — Tempo على 4320/4321
        grpc:
          endpoint: 0.0.0.0:4320
        http:
          endpoint: 0.0.0.0:4321

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 24h

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: local
  storage:
    path: /tmp/tempo/generator/wal
    remote_write:
      - url: http://mimir:9009/api/v1/push
        send_exemplars: true

storage:
  trace:
    backend: local
    wal:
      path: /tmp/tempo/wal
    local:
      path: /tmp/tempo/blocks

query_frontend:
  search:
    duration_slo: 5s
    throughput_bytes_slo: 1.073741824e+09
  trace_by_id:
    duration_slo: 5s

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
