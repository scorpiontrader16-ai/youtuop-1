---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: platform
  labels:
    app: pgbouncer
    app.kubernetes.io/name: pgbouncer
    app.kubernetes.io/component: connection-pooler
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/part-of: youtuop-platform
spec:
  type: ClusterIP
  selector:
    app: pgbouncer
  ports:
    - name: pgbouncer
      port: 6432
      targetPort: 6432
      protocol: TCP
