# infra/docker-compose.m4.yml
#
# M4 — Data Layer services
# الاستخدام: docker compose -f docker-compose.yml -f infra/docker-compose.m4.yml up -d
#
# ملاحظة: Redpanda عنده Schema Registry مدمج على port 8081
#         مش محتاج Confluent Schema Registry منفصل

services:

  # ─────────────────────────────────────────────────────────
  # ClickHouse — Hot Data (بيانات لحظية)
  # ─────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: clickhouse
    ports:
      - "8123:8123"   # HTTP interface  → http://localhost:8123/play
      - "9100:9000"   # Native TCP (9100 عشان مايتعارضش مع MinIO)
    environment:
      CLICKHOUSE_DB:       events
      CLICKHOUSE_USER:     platform
      CLICKHOUSE_PASSWORD: platform
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - platform

  # ─────────────────────────────────────────────────────────
  # MinIO — S3-compatible Cold Storage (self-hosted)
  # ─────────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console → http://localhost:9001
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - platform

  # ─────────────────────────────────────────────────────────
  # MinIO Init — يعمل الـ buckets تلقائياً مرة واحدة
  # ─────────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY:-minioadmin} $${MINIO_SECRET_KEY:-minioadmin123};
        mc mb --ignore-existing local/cold-data;
        mc mb --ignore-existing local/redpanda-tiered;
        mc mb --ignore-existing local/parquet-archive;
        echo 'MinIO buckets ready:';
        mc ls local;
      "
    networks:
      - platform

volumes:
  clickhouse_data:
    driver: local
  minio_data:
    driver: local

networks:
  platform:
    external: true  # يستخدم الـ network الموجودة من docker-compose.yml
