# ╔══════════════════════════════════════════════════════════════════════╗
# ║  Full path: infra/argocd/argocd-notifications-externalsecret.yaml   ║
# ║  Status: 🆕 New — GAP-01 Step 2b                                    ║
# ╚══════════════════════════════════════════════════════════════════════╝
#
# ─────────────────────────────────────────────────────────────────────────────
# الغرض:
#   يُنشئ Secret اسمه "argocd-notifications-secret" في namespace argocd
#   يقرأه ArgoCD notifications controller تلقائياً لإرسال Slack notifications
#
# المتطلب قبل التطبيق — إنشاء السر في AWS Secrets Manager:
#
#   aws secretsmanager create-secret \
#     --name "platform/argocd" \
#     --secret-string '{
#       "SLACK_TOKEN":    "<your-slack-bot-token>",
#       "ADMIN_PASSWORD": "<bcrypt-hashed-admin-password>"
#     }'
#
#   للحصول على Slack Bot Token:
#   1. اذهب إلى https://api.slack.com/apps
#   2. أنشئ app جديد → OAuth & Permissions
#   3. Bot Token Scopes: chat:write, chat:write.public
#   4. انسخ "Bot User OAuth Token" (يبدأ بـ xoxb-)
#
# ملاحظة حرجة:
#   ArgoCD notifications يقرأ المفتاح باسم "slack-token" (hyphen lowercase)
#   AWS SM يخزنه كـ "SLACK_TOKEN" (underscore uppercase)
#   ExternalSecret تحل هذا الفرق في remoteRef.property → secretKey
#
# sync-wave: "-3" — يُطبَّق قبل:
#   wave -2: kyverno
#   wave -1: envoy-gateway, kyverno-policies
#   wave  0: api-gateway
#   wave  1: services
#
# deletionPolicy: Retain — يحمي الـ Secret من الحذف العرضي عند حذف ExternalSecret
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-notifications-secret
  namespace: argocd
  annotations:
    # يُطبَّق أولاً قبل أي workload — notifications controller يحتاجه عند البدء
    argocd.argoproj.io/sync-wave: "-3"
  labels:
    app.kubernetes.io/name: argocd-notifications
    app.kubernetes.io/component: notifications
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/part-of: youtuop-platform
spec:
  # تحديث كل ساعة — يتطابق مع نمط alertmanager-externalsecret.yaml
  refreshInterval: 1h

  secretStoreRef:
    # ClusterSecretStore — يتطابق مع الاسم المستخدم في alertmanager-externalsecret.yaml
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    # الاسم الذي يقرأه ArgoCD notifications controller — لا تغيّره
    name: argocd-notifications-secret
    creationPolicy: Owner
    # Retain: يمنع حذف الـ Secret إذا حُذف الـ ExternalSecret عن طريق الخطأ
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: argocd-notifications
          app.kubernetes.io/component: notifications
          # managed-by: external-secrets على الـ Secret الناتج (ليس kustomize)
          app.kubernetes.io/managed-by: external-secrets
          app.kubernetes.io/part-of: youtuop-platform

  data:
    # ─── Slack Bot Token ───────────────────────────────────────────────────
    # secretKey: "slack-token" — الاسم الذي يقرأه ArgoCD notifications
    # يُستخدم في argocd-values.yaml: notifiers.service.slack: token: $slack-token
    - secretKey: slack-token
      remoteRef:
        key: platform/argocd
        property: SLACK_TOKEN

    # ─── Admin Password (bcrypt hash) ─────────────────────────────────────
    # secretKey: "admin.password" — الاسم الذي يقرأه argocd-secret
    # configs.secret.createSecret: false في argocd-values.yaml →
    # هذا الـ ExternalSecret هو المصدر الوحيد لـ admin password
    # يُستخدم لتسجيل دخول admin عند الحاجة (emergency access فقط)
    # لتوليد bcrypt hash:
    #   htpasswd -nbBC 10 "" <password> | tr -d ':\n' | sed 's/$2y/$2a/'
    - secretKey: admin.password
      remoteRef:
        key: platform/argocd
        property: ADMIN_PASSWORD
