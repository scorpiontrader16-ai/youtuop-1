# ╔══════════════════════════════════════════════════════════════════════╗
# ║  Full path: infra/argocd/apps/applications.yaml                     ║
# ║  App-of-Apps root manifest — youtuop platform                       ║
# ╚══════════════════════════════════════════════════════════════════════╝
#
# Sync wave order (enforced by ArgoCD):
#   -2 → kyverno
#   -1 → kyverno-policies, envoy-gateway
#    0 → api-gateway, platform-appset
#    1 → ingestion, processing, monitoring, falco-config
#    2 → falco
#
# Architecture decision — ingestion & processing as dedicated Applications:
#   Critical data-plane services are intentionally managed as first-class
#   standalone Applications rather than delegated to platform-appset.
#   This gives them:
#     • independent ignoreDifferences (Rollout /spec/replicas — HPA safety)
#     • independent sync status visibility in ArgoCD UI
#     • independent rollback scope
#   platform-appset manages the remaining 13 supporting services.
#   The ApplicationSet generator MUST exclude ingestion and processing
#   from its list to prevent duplicate Application conflicts.
# ─────────────────────────────────────────────────────────────────────────────

# ── Root App-of-Apps ──────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/scorpiontrader16-ai/youtuop-1.git
    targetRevision: main
    path: infra/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true

---
# ── Wave -2: Kyverno policy engine ───────────────────────────────────────────
# Must be fully ready before any workload is admitted to the cluster.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: default
  source:
    repoURL: https://kyverno.github.io/kyverno
    chart: kyverno
    targetRevision: v3.2.0
    helm:
      values: |
        admissionController:
          replicas: 3
        backgroundController:
          replicas: 2
        cleanupController:
          replicas: 2
        reportsController:
          replicas: 2
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

---
# ── Wave -1: Kyverno policies ─────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://github.com/scorpiontrader16-ai/youtuop-1.git
    targetRevision: main
    path: k8s/base/kyverno
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

---
# ── Wave -1: Envoy Gateway ────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app.kubernetes.io/component: api-gateway
spec:
  project: default
  source:
    repoURL: oci://docker.io/envoyproxy
    chart: gateway-helm
    targetRevision: v1.1.0
    helm:
      values: |
        config:
          envoyGateway:
            logging:
              level:
                default: info
  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-gateway-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

---

# ── Wave -1: Vault Configuration ─────────────────────────────────────────────
# يُطبَّق في نفس wave الـ kyverno-policies وenvoy-gateway
# vault نفسه مُثبَّت عبر Terraform — هذا الـ Application يُطبِّق:
#   - ClusterRoleBinding (vault → system:auth-delegator)
#   - ServiceAccount (vault-config-job)
#   - Job (vault-auth-config) كـ PostSync hook
# prune: false — يمنع حذف الـ ClusterRoleBinding عند sync خاطئ
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app.kubernetes.io/component: secrets-management
    app.kubernetes.io/part-of: youtuop-platform
spec:
  project: default
  source:
    repoURL: https://github.com/scorpiontrader16-ai/youtuop-1.git
    targetRevision: main
    path: k8s/base/vault
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

---
# ── Wave 0: API Gateway (HTTPRoute + Gateway resources) ───────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: api-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/component: api-gateway
spec:
  project: default
  source:
    repoURL: https://github.com/scorpiontrader16-ai/youtuop-1.git
    targetRevision: main
    path: k8s/base/api-gateway
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

---
# ── Wave 0: Platform AppSet — manages the 13 supporting services ──────────────
# Manages all platform services EXCEPT ingestion and processing,
# which are declared as dedicated standalone Applications below (wave 1).
# The ApplicationSet generator at infra/argocd/applicationsets MUST
# explicitly exclude ingestion and processing to prevent duplicate
# Application conflicts in ArgoCD.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-appset
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/component: gitops
    app.kubernetes.io/part-of: youtuop-platform
spec:
  project: default
  source:
    repoURL: https://github.com/scorpiontrader16-ai/youtuop-1.git
    targetRevision: main
    path: infra/argocd/applicationsets
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

---
# ── Wave 1: Ingestion service ─────────────────────────────────────────────────
# Managed as a dedicated Application (not delegated to platform-appset) to
# preserve independent sync scope and ignoreDifferences on Rollout replicas.
# ignoreDifferences: prevents ArgoCD from reverting HPA-managed replica counts
# on the Argo Rollout object — without this, every sync resets replicas to
# the Git-declared value, fighting the HPA on every reconciliation loop.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingestion
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/component: data-plane
    app.kubernetes.io/part-of: youtuop-platform
spec:
  project: default
  source:
    repoURL: https://github.com/scorpiontrader16-ai/youtuop-1.git
    targetRevision: main
    path: k8s/overlays/production/ingestion
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: argoproj.io
      kind: Rollout
      jsonPointers:
        - /spec/replicas

---
# ── Wave 1: Processing service ────────────────────────────────────────────────
# Managed as a dedicated Application (not delegated to platform-appset) to
# preserve independent sync scope and ignoreDifferences on Rollout replicas.
# ignoreDifferences: same rationale as ingestion above — HPA safety guard.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: processing
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/component: data-plane
    app.kubernetes.io/part-of: youtuop-platform
spec:
  project: default
  source:
    repoURL: https://github.com/scorpiontrader16-ai/youtuop-1.git
    targetRevision: main
    path: k8s/overlays/production/processing
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: argoproj.io
      kind: Rollout
      jsonPointers:
        - /spec/replicas

---
# ── Wave 1: Monitoring stack ──────────────────────────────────────────────────
# prune: false — intentional. Prevents accidental deletion of alerting state.
# ServerSideApply: required for StatefulSet (alertmanager) field manager
#   correctness — prevents conflicts on volumeClaimTemplates and selector fields.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/scorpiontrader16-ai/youtuop-1.git
    targetRevision: main
    path: k8s/base/monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

---
# ── Wave 1: Falco prerequisites ───────────────────────────────────────────────
# Deploys: ExternalSecret (falco-secrets) + NetworkPolicy for the falco namespace.
# Must be fully synced BEFORE wave 2 so that `falco-secrets` Secret exists
# when Falcosidekick's extraEnv secretKeyRef is resolved during Pod scheduling.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/component: runtime-security
    app.kubernetes.io/part-of: youtuop-platform
spec:
  project: default
  source:
    repoURL: https://github.com/scorpiontrader16-ai/youtuop-1.git
    targetRevision: main
    path: k8s/base/falco
  destination:
    server: https://kubernetes.default.svc
    namespace: falco
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

---
# ── Wave 2: Falco Helm chart ──────────────────────────────────────────────────
#
# Multi-source pattern:
#   Source 1 (ref: values) — pins the platform Git repo so that $values
#             resolves to the repo root. Used only as a valueFiles reference;
#             no path is rendered from this source.
#   Source 2 — the actual Falco Helm chart from falcosecurity.github.io.
#             valueFiles merges infra/falco/platform-rules.yaml (customRules)
#             on top of the inline `values` block.
#
# Merge order (Helm precedence, last wins):
#   1. Chart defaults
#   2. $values/infra/falco/platform-rules.yaml   (customRules block)
#   3. Inline `values` block (driver, collectors, falcosidekick, etc.)
#
# The inline block is authoritative for all operational config.
# platform-rules.yaml is authoritative only for the customRules key,
# which the inline block intentionally omits.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/component: runtime-security
    app.kubernetes.io/part-of: youtuop-platform
spec:
  project: default
  sources:
    # ── Source 1: Git repo — provides $values reference ──────────────────
    - repoURL: https://github.com/scorpiontrader16-ai/youtuop-1.git
      targetRevision: main
      ref: values

    # ── Source 2: Falco Helm chart ────────────────────────────────────────
    - repoURL: https://falcosecurity.github.io/charts
      chart: falco
      targetRevision: 3.8.0
      helm:
        # valueFiles resolved against the $values ref (Source 1 above).
        # Requires ArgoCD v2.6+ for multi-source $values substitution.
        valueFiles:
          - $values/infra/falco/platform-rules.yaml
        values: |
          # ── Driver ───────────────────────────────────────────────────────
          driver:
            kind: modern_ebpf

          tty: true

          # ── Falco core ───────────────────────────────────────────────────
          falco:
            grpc:
              enabled: true
            grpc_output:
              enabled: true
            json_output: true
            json_include_output_property: true
            log_level: info

          # ── Collectors ───────────────────────────────────────────────────
          collectors:
            containerd:
              enabled: true
              socket: /run/containerd/containerd.sock
            docker:
              enabled: false
            cri:
              enabled: true
              socket: /run/containerd/containerd.sock

          # ── DaemonSet scheduling ──────────────────────────────────────────
          nodeSelector:
            kubernetes.io/arch: arm64

          priorityClassName: system-node-critical

          tolerations:
            - effect: NoSchedule
              operator: Exists

          # ── DaemonSet resources ───────────────────────────────────────────
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1024Mi

          # ── Falcosidekick ─────────────────────────────────────────────────
          falcosidekick:
            enabled: true
            replicaCount: 2

            priorityClassName: system-cluster-critical

            config:
              slack:
                # Injected at runtime via FALCOSIDEKICK_SLACK_WEBHOOKURL env var.
                # Set to empty string here — the extraEnv block below is the
                # authoritative source. Falcosidekick Viper config resolves
                # env vars over file config (SetEnvPrefix + AutomaticEnv).
                webhookurl: ""
                minimumpriority: warning
                outputformat: "all"
              alertmanager:
                # FQDN to avoid cross-namespace DNS failures.
                hostport: "http://alertmanager.monitoring.svc.cluster.local:9093"
                minimumpriority: warning
                endpoint: "/api/v2/alerts"

            # Slack webhook from ExternalSecret-managed Secret (wave 1).
            # Config key "slack.webhookurl" → env FALCOSIDEKICK_SLACK_WEBHOOKURL.
            extraEnv:
              - name: FALCOSIDEKICK_SLACK_WEBHOOKURL
                valueFrom:
                  secretKeyRef:
                    name: falco-secrets
                    key: SLACK_WEBHOOK_URL

            # ── Security context ──────────────────────────────────────────
            podSecurityContext:
              runAsNonRoot: true
              runAsUser: 65534
              runAsGroup: 65534
              fsGroup: 65534

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

            # tmpfs for Go runtime temp writes under readOnlyRootFilesystem.
            extraVolumes:
              - name: tmp
                emptyDir: {}

            extraVolumeMounts:
              - name: tmp
                mountPath: /tmp

            # ── Resources ─────────────────────────────────────────────────
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 256Mi

            # ── Scheduling ────────────────────────────────────────────────
            nodeSelector:
              kubernetes.io/arch: arm64

            topologySpreadConstraints:
              - maxSkew: 1
                topologyKey: topology.kubernetes.io/zone
                whenUnsatisfiable: DoNotSchedule
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: falcosidekick
              - maxSkew: 1
                topologyKey: kubernetes.io/hostname
                whenUnsatisfiable: DoNotSchedule
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: falcosidekick

            # ── Metrics (annotation-based scrape) ─────────────────────────
            podAnnotations:
              prometheus.io/scrape: "true"
              prometheus.io/port: "2802"
              prometheus.io/path: "/metrics"

            # ── Labels ───────────────────────────────────────────────────
            podLabels:
              app.kubernetes.io/part-of: youtuop-platform
              app.kubernetes.io/managed-by: helm

  destination:
    server: https://kubernetes.default.svc
    namespace: falco
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

